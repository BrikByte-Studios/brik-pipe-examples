services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_SOURCE: ${IMAGE_SOURCE:-unknown}
        VCS_REF: ${VCS_REF:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: brikbyte/go-api-example:ci
    ports:
      - "8080:8080"
    environment:
      TEST_DB_VENDOR: postgres
      TEST_DB_HOST: db
      TEST_DB_PORT: "5432"
      TEST_DB_NAME: ${TEST_DB_NAME:-app_test}
      TEST_DB_USER: ${TEST_DB_USER:-app}
      TEST_DB_PASSWORD: ${TEST_DB_PASSWORD:-app}

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      PORT: "8080"
      EXTERNAL_API_BASE_URL: "http://mock-payments:8081"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-payments:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${TEST_DB_NAME:-app_test}
      POSTGRES_USER: ${TEST_DB_USER:-app}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-app}
    # ✅ In CI you do NOT need to publish DB ports to the host.
    # If you keep this, host tests may accidentally hit it.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_DB_USER:-app} -d ${TEST_DB_NAME:-app_test}"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - ./integration/seed/data:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  # ✅ External provider mock that api calls at http://mock-payments:8081/external/payment
  mock-payments:
    image: wiremock/wiremock:3.6.0
    ports:
      - "8081:8080" # optional for debugging; api uses service DNS anyway
    command: ["--port", "8081", "--global-response-templating"]
    volumes:
      - ./integration/mocks/wiremock:/home/wiremock:ro

  # ✅ Run integration tests INSIDE the compose network (so "db" and "api" resolve)
  tester:
    image: golang:1.22-bookworm
    working_dir: /src
    volumes:
      - ./:/src
    environment:
      APP_BASE_URL: http://api:8080
      TEST_DB_VENDOR: postgres
      TEST_DB_HOST: db
      TEST_DB_PORT: "5432"
      TEST_DB_NAME: ${TEST_DB_NAME:-app_test}
      TEST_DB_USER: ${TEST_DB_USER:-app}
      TEST_DB_PASSWORD: ${TEST_DB_PASSWORD:-app}
      EXTERNAL_API_BASE_URL: http://mock-payments:8081
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-payments:
        condition: service_started
