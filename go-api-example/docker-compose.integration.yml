services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_SOURCE: ${IMAGE_SOURCE:-unknown}
        VCS_REF: ${VCS_REF:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: brikbyte/go-api-example:ci
    ports:
      - "8080:8080"
    environment:
      # optional, but useful if later you wire DB usage into the app
      TEST_DB_VENDOR: postgres
      TEST_DB_HOST: localhost
      TEST_DB_PORT: "5432"
      TEST_DB_NAME: ${TEST_DB_NAME:-app_test}
      TEST_DB_USER: ${TEST_DB_USER:-app}
      TEST_DB_PASSWORD: ${TEST_DB_PASSWORD:-app}

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      PORT: "8080"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    # # If your app exposes /health, keep this (recommended)
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health | grep -q 'OK'"]
    #   interval: 3s
    #   timeout: 3s
    #   retries: 40

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${TEST_DB_NAME:-app_test}
      POSTGRES_USER: ${TEST_DB_USER:-app}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-app}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_DB_USER:-app} -d ${TEST_DB_NAME:-app_test}"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - ./integration/seed/data:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30
