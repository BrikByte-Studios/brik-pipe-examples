services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_test"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - ./integration/seed/data:/docker-entrypoint-initdb.d:ro

  mock:
    image: wiremock/wiremock:3.9.1
    # Optional: don't publish to host unless you need it
    # ports:
    #   - "8080:8080"
    volumes:
      - ./integration/mocks/wiremock/mappings:/home/wiremock/mappings:ro
      - ./integration/mocks/wiremock/__files:/home/wiremock/__files:ro
    # REMOVE healthcheck (avoid wget/curl dependency)

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_SOURCE: ${IMAGE_SOURCE:-unknown}
        VCS_REF: ${VCS_REF:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    environment:
      NODE_ENV: test
      PORT: "3000"
      TEST_DB_HOST: db
      TEST_DB_PORT: "5432"
      TEST_DB_NAME: app_test
      TEST_DB_USER: app
      TEST_DB_PASSWORD: app
      EXTERNAL_API_BASE_URL: http://mock:8080
    depends_on:
      db:
        condition: service_healthy
      mock:
        condition: service_started
    ports:
      - "3000:3000"
    # Optional: remove api healthcheck too (same wget issue)
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 3s
      timeout: 3s
      retries: 40

