schemaVersion: 1
stack: node
workingDirectory: "."
runtime:
  version: "20"
tool:
  kind: "npm"
flags:
  runLint: true
  runTests: true
commands:
  install: "make install"
  lint: "make lint"
  test: "make test"
  build: "make build"
artifacts:
  paths:
    - "dist/**"
    - "coverage/**"
    - "out/**"
