schemaVersion: 1
stack: python
workingDirectory: "."
runtime:
  version: "3.12"
tool:
  kind: pip
flags:
  runLint: true
  runTests: true
commands:
  install: "make deps"
  lint: "make lint"
  test: "make test-unit"
  build: "make build"
artifacts:
  paths:
    - "dist/**"
    - "out/**"
    - "__pycache__/**"
