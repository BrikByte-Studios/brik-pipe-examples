services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: brikbyte/python-api-example:ci
    ports:
      - "8000:8000"
    environment:
      # optional, but useful if later you wire DB usage into the app
      TEST_DB_VENDOR: postgres
      TEST_DB_HOST: db
      TEST_DB_PORT: "5432"
      TEST_DB_NAME: app_test
      TEST_DB_USER: app
      TEST_DB_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read(); print('ok')\""]
      interval: 3s
      timeout: 3s
      retries: 40

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_test"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - ./integration/seed/data:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30
