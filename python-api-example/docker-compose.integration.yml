services:

  # ---------------------------------------------------------------------------
  # Python API under test
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: brikbyte/python-api-example:integration
    container_name: python-api
    ports:
      - "8000:8000"
    environment:
      # DB contract (matches PIPE-CORE-2.2.3 env contract)
      TEST_DB_VENDOR: postgres
      TEST_DB_HOST: db
      TEST_DB_PORT: 5432
      TEST_DB_NAME: ${TEST_DB_NAME:-app_test}
      TEST_DB_USER: ${TEST_DB_USER:-app}
      TEST_DB_PASSWORD: ${TEST_DB_PASSWORD:-app}

      # Cache / mocks (future-proof)
      TEST_REDIS_URL: redis://redis:6379/0

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health | grep -q ok"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: unless-stopped


  # ---------------------------------------------------------------------------
  # Postgres fixture
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${TEST_DB_NAME:-app_test}
      POSTGRES_USER: ${TEST_DB_USER:-app}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-app}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_DB_USER:-app} -d ${TEST_DB_NAME:-app_test}"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - ./integration/seed/data:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped


  # ---------------------------------------------------------------------------
  # Redis fixture
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: unless-stopped
