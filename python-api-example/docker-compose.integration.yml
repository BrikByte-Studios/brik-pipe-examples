services:
  api:
    # Build locally from this repo (CI-friendly, no registry login needed)
    build:
      context: .
      dockerfile: Dockerfile

    # Optional: name the built image for easier debugging
    image: brikbyte/python-api-example:ci

    # Ensure compose doesn't try to pull from a registry
    pull_policy: never

    environment:
      # Your app currently doesn't require DB env vars, but keep the contract ready
      TEST_DB_VENDOR: ${TEST_DB_VENDOR:-postgres}
      TEST_DB_HOST: ${TEST_DB_HOST:-db}
      TEST_DB_PORT: ${TEST_DB_PORT:-5432}
      TEST_DB_NAME: ${TEST_DB_NAME:-app_test}
      TEST_DB_USER: ${TEST_DB_USER:-app}
      TEST_DB_PASSWORD: ${TEST_DB_PASSWORD:-app}

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      # python:3.11-slim doesn't include curl by default, so use python stdlib
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read(); print('ok')\""
        ]
      interval: 3s
      timeout: 3s
      retries: 40

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_test"]
      interval: 3s
      timeout: 3s
      retries: 40
    volumes:
      - ./integration/seed/data:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30
