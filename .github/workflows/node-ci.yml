name: "Example: node ci (Build + unit test)"

on: [push, pull_request]

jobs:
  build:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/build.yml@main
    with:
      stack: "node"
      working_directory: "node-api-example"
      runtime_version: ""               # or "20" / "20.x" if you want explicit
      package_manager: ""               # or "npm" / "pnpm" / "yarn" (optional)

      run_lint: true
      run_tests: true
      lint_command: "make lint"
      test_command: "make test"
      build_command: "make build"

      upload_artifacts: true
      artifact_paths: "dist/**,coverage/**,out/**"

      # Cache (PIPE-CORE-1.3)
      enable_cache: true
      cache_bust: ""
      allow_cache_write: true

  unit-tests:
    # Keep your advanced enforcement / coverage logic as-is
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test-node.yml@main
    with:
      working_directory: "node-api-example"
      node_version: "20"
      package_manager: "npm"
      test_command: "make test"
      coverage_mode: "optional"
      enforcement_mode: "warn"
