# BrikPipe — Java API Integration Tests (Example Service)
# -------------------------------------------------------
# Purpose:
#   Run containerized integration tests for the Java example service by
#   delegating to the reusable integration-test workflow in:
#
#     BrikByte-Studios/.github/.github/workflows/integration-test.yml@main
#
#   This job:
#     - Builds or pulls the *real* Java service image.
#     - Spins up Postgres as a DB dependency.
#     - Starts the app container.
#     - Runs Java integration tests from the shared runner image
#       (Maven/Gradle/Testcontainers-friendly).
#     - Tears everything down deterministically.
#
# Assumptions:
#   - Java service lives in: java-api-example/
#   - Its Dockerfile is:    java-api-example/Dockerfile
#   - App listens on port:  8080
#   - Health endpoint:      /actuator/health   (Spring Boot-style)
#   - Integration tests can be driven via:
#       ./mvnw -B verify -Pintegration-tests
#     or equivalent, as implemented in run-integration-tests.sh.

name: "Java API — Containerized Integration Tests"

on:
  push:
    branches: [ main ]
    paths:
      # Trigger when Java example or this workflow changes
      - "java-api-example/**"
      - ".github/workflows/java-api-integration.yml"

  pull_request:
    branches: [ main ]
    paths:
      - "java-api-example/**"
      - ".github/workflows/java-api-integration.yml"

jobs:
  integration:
    name: "Java API — Integration"
    # Re-use the central BrikPipe integration-test workflow
    uses: BrikByte-Studios/.github/.github/workflows/integration-test.yml@main
    secrets: inherit

    with:
      # ----------------------------------------------------------
      # Service image under test
      # ----------------------------------------------------------
      # Convention:
      #   ghcr.io/<org>/<image-name>:sha-<GITHUB_SHA>
      #
      # This should match the image tag produced by your Kaniko
      # or build pipeline for the java-api-example service.
      image: ghcr.io/brikbyte-studios/example-java-api:sha-${{ github.sha }}

      # Path to the Java service Dockerfile (relative to repo root)
      dockerfile: java-api-example/Dockerfile

      # Build context for the service Docker image
      context: java-api-example

      # ----------------------------------------------------------
      # Dependency containers
      # ----------------------------------------------------------
      # Database image (Postgres 16 by default)
      db_image: postgres:16

      # Optional cache / message broker (e.g. Redis, RabbitMQ).
      # Set enable_cache_service: true if your Java service needs it.
      cache_image: redis:7
      enable_cache_service: false

      # ----------------------------------------------------------
      # Test runner configuration
      # ----------------------------------------------------------
      # Let the shared runner know this is a Java stack so it will
      # use Maven/Gradle defaults unless test_command is provided.
      test_language: "java"

      # Optional explicit command:
      #   e.g. "./mvnw -B verify -Pintegration-tests"
      # Leave empty to use the defaults in run-integration-tests.sh
      test_command: ""

      # ----------------------------------------------------------
      # Health checks & ports
      # ----------------------------------------------------------
      # Java / Spring Boot services often expose actuator health here.
      healthcheck_path: "/actuator/health"

      # Max seconds to wait for DB + app readiness before failing
      healthcheck_timeout: "60"

      # Port exposed by the Java API container
      app_port: "8080"

      # DB port used both for container publish and readiness checks
      db_port: "5432"
