name: "Python API — Integration (BrikByteOS)"

on:
  workflow_dispatch: {}
  push:
    paths:
      - "python-api-example/**"
      - ".github/workflows/python-api-integration.yml"

jobs:
  integration:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/reuse-integration-python.yml@main
    secrets:
      TEST_DB_NAME: ${{ secrets.TEST_DB_NAME }}
      TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}

    with:
      # Service location
      working_directory: python-api-example

      # Compose lab
      compose_file: docker-compose.integration.yml
      services: api,db,redis

      # Health gate
      health_timeout_seconds: "180"

      # App base URL (host reachable)
      app_base_url: http://localhost:8080

      # Integration seed hooks
      seed_exec: |
        db::psql -U app -d app_test -c "select 1;"

      # Evidence / audit
      evidence_dir: test-artifacts/integration/raw
      raw_results_dir: test-artifacts/integration/test-results

      # Python runtime
      python_version: "3.12"
