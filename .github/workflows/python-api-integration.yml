name: "Example: python integration (Compose Lab + Integration Tests)."

on: [push, pull_request]

jobs:
  integration:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/integration-test.yml@main
    with:
      stack: "python"

      # repo layout
      working_directory: "python-api-example"

      # compose lab
      compose_file: "docker-compose.integration.yml"
      services: "api,db,redis"
      required_services: ""            # empty => same as services
      health_timeout_seconds: "180"
      health_poll_seconds: "3"
      down_volumes: "true"
      compose_profiles: ""

      # seeding (optional)
      seed_commands: ""
      seed_exec: ""

      # test runner
      app_base_url: "http://localhost:8080"
      python_version: "3.12"
      integration_command: "make test-integration"

      # IMPORTANT: where your repo writes junit (relative to working_directory)
      junit_source_path: "test-artifacts/test-results/junit-integration.xml"

      # evidence
      evidence_dir: "test-artifacts/integration/raw"
      raw_results_dir: "test-artifacts/integration/test-results"
      normalized_results_out: "test-artifacts/integration/test-results.json"
      upload_artifacts: true
      artifact_retention_days: 7
      timeout_minutes: 20

      # env contract
      provision_env_mode: "github-secrets"
      required_keys: "TEST_DB_PASSWORD TEST_DB_USER TEST_DB_NAME"
      enforcement_mode: "enforce"
      mask_secrets: true

      # ------------------------------------------------------------
      # Flaky detection (PIPE-CORE-2.5.1) — opt-in repeat-run
      # ------------------------------------------------------------
      flaky_detection_enabled: true

      # conservative defaults for integration
      repeat_runs: 3
      repeat_suite_name: "integration"
      repeat_max_runs: 5
      repeat_max_wall_clock_minutes: 45

      # where the integration test runner writes reports (relative to working_directory)
      # NOTE: this should match what 'make test-integration' produces.
      repeat_results_glob: "test-artifacts/integration/test-results/**/*.xml"

      # where repeat-run evidence is stored (relative to working_directory)
      repeat_out_dir: "test-results/flaky/integration"

    secrets:
      TEST_DB_NAME: ${{ secrets.TEST_DB_NAME }}
      TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}

  flaky-trends:
    name: "Flaky trends (main only)"
    if: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
    needs: [integration]
    runs-on: ubuntu-latest
    steps:
      - name: Flaky trends
        uses: BrikByte-Studios/brik-pipe-actions/.github/actions/flaky-trend-aggregator@main
        with:
          enabled: "true"
          windows: "7,30"
          top_n: "10"
          branch: "main"
          event_filter: "push"
          artifact_name_prefix: "flaky-summary-run-"
          max_runs_scan: "60"
          out_dir: "test-results/flaky/trends"
          stable_max_fail_rate: "0.05"
          flaky_max_fail_rate: "0.40"
          write_markdown: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload flaky trends outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "flaky-trends-${{ github.run_id }}"
          path: test-results/flaky/trends/**
          if-no-files-found: warn
          retention-days: 30

