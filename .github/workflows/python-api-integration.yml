# Python API Example — Containerized Integration Tests
# ----------------------------------------------------
# This workflow:
#   - Triggers on changes to python-api-example/ and to this workflow file.
#   - Delegates orchestration to the reusable BrikPipe integration-test workflow
#     in the .github governance repo.
#   - Builds/uses the real Python service image and runs integration tests
#     against app + DB (and optional cache if enabled).
#
# Assumptions for the python-api-example sample:
#   - Service directory: python-api-example/
#   - Dockerfile:        python-api-example/Dockerfile
#   - App port:          8000 (e.g. FastAPI/uvicorn) — adjust if needed.
#   - Health endpoint:   GET /health returning 2xx when ready.
#
# If your image name or port differs, adjust `image`, `app_port`,
# and `healthcheck_path` values in the `with:` block

name: "Python API — Integration Tests"

on:
  pull_request:
    branches: [ main ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/python-api-integration.yml"
  push:
    branches: [ main ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/python-api-integration.yml"

jobs:
  integration:
    name: "Python API — Containerized Integration Tests"
    # Reuse the central workflow from the .github governance repo.
    # Use @main until you create a version tag (e.g. @v1).
    uses: BrikByte-Studios/.github/.github/workflows/integration-test.yml@main
    secrets: inherit

    with:
      # Full image tag for the Python API service.
      # IMPORTANT: Align this with whatever PIPE-CONTAINER-KANIKO-INTEG-003 pushes.
      # Example pattern (adjust name if needed):
      #   ghcr.io/brikbyte-studios/example-python-api:sha-<GITHUB_SHA>
      image: ghcr.io/brikbyte-studios/example-python-api:sha-${{ github.sha }}

      # Where to build from if the image is not found in GHCR.
      dockerfile: python-api-example/Dockerfile
      context: python-api-example

      # Integration dependencies
      db_image: postgres:16

      # If this sample also uses Redis / MQ, set cache_image and enable_cache_service to true.
      # For a simple Python API sample, you can leave cache disabled (false)
      cache_image: redis:7
      enable_cache_service: true

      # Test execution
      test_language: "python"
      # Optional: override to a custom command if you don't use pytest -m integration:
      test_command: "pytest tests/integration -m 'integration'"

      # Health checks
      healthcheck_path: "/health"
      healthcheck_timeout: "60"

      # Network ports
      app_port: "8080"   # Adjust to your Python service port (8000 for FastAPI by default)
      db_port: "5432"

      # matrix inputs (service × scenario)
      services_csv: "payments,users"
      scenarios_csv: "happy_path,declined_card,timeout"

      # governed parallelism (clamped to integration.cap=4)
      override_shards: "4"
