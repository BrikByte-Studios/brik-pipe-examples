name: "node-ui-example: e2e (playwright parallel)"

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  e2e:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/e2e-test-parallel.yml@main
    with:
      stack: node
      working_directory: "node-ui-example"

      # Browser matrix
      browsers: '["chromium","firefox","webkit"]'
      shards: 4
      shards_per_browser: '{"chromium":4,"firefox":2,"webkit":2}'
      browser_env_name: "E2E_BROWSER"

      # The shard runner sets BRIK_SHARD_INDEX / BRIK_SHARD_TOTAL for each job.
      # Makefile converts to Playwright --shard=a/b (1-based internally).
      e2e_command: |
        bash "${GITHUB_WORKSPACE}/node-ui-example/scripts/e2e-playwright.sh"

      # Evidence + parsing contract
      raw_reports_dir: "node-ui-example/test-artifacts/e2e/test-results"
      out_root: "test-artifacts"

      upload_artifacts: true
      enable_merge_job: true
      merged_results_out: "test-artifacts/e2e/test-results.json"
      timeout_minutes: 45
