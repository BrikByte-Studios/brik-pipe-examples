# -----------------------------------------------------------------------------
# brik-pipe-examples — Caller workflow
#
# Repo: brik-pipe-examples
# Path: brik-pipe-examples/.github/workflows/unit-test-parallel-demo.yml
#
# Calls:
#   BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test-parallel.yml@main
#
# Notes:
# - Each example app can have its own job (node / python / go / dotnet)
# - Each app should have: .brik/parallel.yml (recommended)
# -----------------------------------------------------------------------------

name: "Examples: unit-test-parallel (v1)."

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "examples-unit-parallel-${{ github.ref }}"
  cancel-in-progress: true

jobs:
