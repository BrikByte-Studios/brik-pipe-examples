#   # Node example: node-ui-example
#   # ---------------------------------------------------------------------------
#   unit_node_ui:
#     name: "Unit (node) — node-ui-example"
#     uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test-parallel.yml@main
#     with:
#       stack: "node"
#       working_directory: "node-ui-example"

#       # Prefer contract-driven shards (requires .brik/parallel.yml in the example)
#       parallel_enabled: true
#       parallel_contract_path: "node-ui-example/.brik/parallel.yml"
#       use_contract_shards: true
#       shards: 4 # fallback if contract missing/unreadable

#       # Typical node unit command
#       test_command: "npm test"

#       # Runtime
#       node_version: "20.x"

#       # Controls
#       timeout_minutes: 20
#       artifact_retention_days: 7
#       upload_artifacts: true

#       # Optional fan-in merge
#       enable_merge_job: true
#       merged_results_out: "test-artifacts/unit/test-results.json"

  # ---------------------------------------------------------------------------
  # Python example: python-api-example
  # ---------------------------------------------------------------------------
  unit_python_api:
    name: "Unit (python) — python-api-example"
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test-parallel.yml@main
    with:
      stack: "python"
      working_directory: "python-api-example"

      parallel_enabled: true
      parallel_contract_path: "python-api-example/.brik/parallel.yml"
      use_contract_shards: true
      shards: 4

      # If your runner supports native sharding, keep shard_mode=native.
      # If not, switch to list mode and provide discover_command.
      shard_mode: "list"
      discover_command: |
        python - <<'PY'
        import pathlib
        p = pathlib.Path("tests")
        files = sorted(
            str(x) for x in p.rglob("test_*.py")
            if "tests/integration" not in str(x)
        )
        print("\n".join(files))
        PY
      test_command: "make test-unit"

      python_version: "3.11"

      timeout_minutes: 20
      artifact_retention_days: 7
      upload_artifacts: true

      enable_merge_job: true
      merged_results_out: "test-artifacts/unit/test-results.json"

