name: "E2E UI (Python • Selenium Grid)"

# -----------------------------------------------------------------------------
# Caller workflow (brik-pipe-examples)
#
# Calls the org reusable workflow:
#   BrikByte-Studios/.github/.github/workflows/e2e-selenium.yml
#
# This repo provides:
#   - docker-compose.selenium.yml        (Grid)
#   - python-selenium-example/           (tests)
#   - node-ui-example/docker-compose.e2e.yml (app under test)
#
# The reusable workflow provides:
#   - start app (optional)
#   - start grid
#   - wait for app + grid readiness
#   - run tests for Chrome + Firefox matrix
#   - optional Edge job
#   - collect logs + upload artifacts
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e-ui-python:
    uses: BrikByte-Studios/.github/.github/workflows/e2e-selenium.yml@main
    with:
      # IMPORTANT:
      # - Browser nodes run in containers; "localhost" from the browser ≠ runner host.
      # - Use host.docker.internal (with host-gateway mapping in docker-compose.selenium.yml).
      target_url: "http://host.docker.internal:3000"
      health_url: "http://localhost:3000/health"

      # Start node-ui-example inside the reusable workflow job
      start_app: true
      app_service_workdir: "node-ui-example"
      app_compose_file: "docker-compose.e2e.yml"

      # Grid config in this repo
      service_workdir: "."
      compose_file: "docker-compose.selenium.yml"

      runner_language: "python"
      test_command: |
        set -euo pipefail
        cd python-selenium-runner-example
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pytest

      enable_edge: false
      artifact_name: "python-selenium-e2e"
