# -----------------------------------------------------------------------------
# Example: E2E parallelization (browser × shard)
# Heavy, flake-prone → strictly governed
# -----------------------------------------------------------------------------

name: "CI E2E Tests (node-ui-example) Parallel"

on: [push, pull_request]

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix_json }}
    steps:
      - uses: actions/checkout@v4

      # Generate browser × shard matrix with enforced caps
      - id: plan
        uses: BrikByte-Studios/.github/.github/actions/matrix-plan@main
        with:
          test_type: e2e
          override_shards: 6
          browsers: chromium,firefox

  e2e:
    needs: plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: node-ui-example

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx --yes playwright install --with-deps

      - name: Build UI (if needed)
        run: npm run build --if-present

      - name: Start UI app
        run: |
          mkdir -p out
          nohup npm run start --if-present > out/app.log 2>&1 &
          echo "Started UI app (background)."

      - name: Wait for UI health
        run: |
          for i in {1..60}; do
            curl -fsS "http://localhost:3000/health" && exit 0
            sleep 2
          done
          echo "UI app not ready. Last logs:"
          tail -n 200 out/app.log || true
          exit 1

      - name: Run Playwright (browser × shard)
        run: |
          echo "E2E: ${{ matrix.browser }} shard ${{ matrix.shard }}/${{ strategy.job-total }}"
          npx --yes playwright test \
            --project="${{ matrix.browser }}" \
            --shard="${{ matrix.shard }}/${{ strategy.job-total }}"
