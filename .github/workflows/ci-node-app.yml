# =========================================================================================
#  BrikByteOS — Node CI Workflow with Intelligent Dependency Cache
#
#  Purpose:
#   - Validate builds for `node-app` inside brik-pipe-examples.
#   - Automatically detects package manager:
#       → npm OR yarn.lock OR pnpm-lock.yaml
#   - Restores cache if lockfile + Node version unchanged.
#   - Reduces CI time significantly (warm ≪ cold).
#
#  This workflow proves the implementation for:
#       TASK: PIPE-CACHE-NODE-BUILD-001
#
#  Repo Lives In:
#       brik-pipe-examples/.github/workflows/ci-node-app.yml
#
#  Uses shared composite action from:
#       Repo: BrikByte-Studios/.github
#       Path: .github/actions/cache-node-deps
#
# =========================================================================================

name: "CI — Node App (Cache Enabled)"

on:
  # Runs whenever Node-app source changes OR this CI file is updated.
  push:
    branches: [ main ]
    paths:
      - "node-api=example/**"
      - ".github/workflows/ci-node-app.yml"

  pull_request:
    branches: [ main ]
    paths:
      - "node-api=example/**"
      - ".github/workflows/ci-node-app.yml"

env:
  NODE_VERSION: "20"   # 🔧 Standardized Node runtime for CI safety

jobs:
  build-test:
    name: "Build & Test — node-api=example"
    runs-on: ubuntu-latest

    # All 'run:' commands automatically execute inside /node-app
    defaults:
      run:
        working-directory: node-api=example

    steps:

      # -------------------------------------------------------------------------
      # 1) Checkout Source
      # -------------------------------------------------------------------------
      - name: "Checkout repository"
        uses: actions/checkout@v4


      # -------------------------------------------------------------------------
      # 2) Setup Node with version-sync to cache keys
      # -------------------------------------------------------------------------
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}


      # -------------------------------------------------------------------------
      # 3) Node Cache (npm, Yarn, pnpm)
      #
      # Uses BrikByte composite action:
      #  - Detects manager automatically
      #  - Caches dependencies using lockfile + NODE_VERSION
      #
      # Cache Key = [os]-[node-version]-[manager]-[lockfileHash]
      #
      # Examples:
      #    node-linux-20-npm-<hash>
      #    node-linux-20-yarn-<hash>
      #
      # Repo: BrikByte-Studios/.github
      # File: .github/actions/cache-node-deps/action.yml
      # -------------------------------------------------------------------------
      - name: "Cache Node dependencies (npm / Yarn / pnpm)"
        uses: BrikByte-Studios/.github/.github/actions/cache-node-deps@main
        with:
          node-version: ${{ env.NODE_VERSION }}


      # -------------------------------------------------------------------------
      # 4) Install Dependencies
      #
      # npm ci preferred → reproducible + faster for CI
      # Yarn/pnpm users auto-detected via cache action above.
      # -------------------------------------------------------------------------
      - name: "Install dependencies"
        run: npm ci


      # -------------------------------------------------------------------------
      # 5) Run Unit Tests (if they exist)
      #
      # `--if-present` prevents failure if no test script.
      # -------------------------------------------------------------------------
      - name: "Run tests"
        run: npm test --if-present


      # -------------------------------------------------------------------------
      # 6) Optional Build Step — Verifies production bundling
      #
      # Recommended best practice to test build determinism.
      # -------------------------------------------------------------------------
      - name: "Build app"
        run: npm run build --if-present
