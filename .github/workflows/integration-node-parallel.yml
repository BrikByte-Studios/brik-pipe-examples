name: "Examples: integration-test-parallel (node)"

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: "examples-integration-node-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  integration_node_api:
    name: "Integration (node) — node-api-example"

    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/integration-test-parallel.yml@main

    with:
      # -------------------------------------------------------------------
      # Required
      # -------------------------------------------------------------------
      stack: "node"

      # Must generate JUnit / reports under test-artifacts/integration/
      integration_command: "make test:integration"

      # -------------------------------------------------------------------
      # Repo layout
      # -------------------------------------------------------------------
      working_directory: "node-api-example"

      # -------------------------------------------------------------------
      # Parallelization
      # -------------------------------------------------------------------
      parallel_enabled: true
      parallel_contract_path: "node-api-example/.brik/parallel.yml"

      use_contract_shards: true
      shards: 4                # fallback

      shard_mode: "native"     # Jest/Mocha native sharding

      # -------------------------------------------------------------------
      # Runtime
      # -------------------------------------------------------------------
      node_version: "20.x"

      # -------------------------------------------------------------------
      # Output contract
      # -------------------------------------------------------------------
      out_root: "test-artifacts"

      raw_reports_dir: "test-artifacts/integration/test-results"

      merged_results_out: "test-artifacts/integration/test-results.json"

      # -------------------------------------------------------------------
      # Integration environment
      # -------------------------------------------------------------------
      app_base_url: "http://localhost:3000"

      # -------------------------------------------------------------------
      # Controls
      # -------------------------------------------------------------------
      timeout_minutes: 45

      artifact_retention_days: 7

      upload_artifacts: true

      fail_on_missing_reports: true
      fail_on_missing_shards: true

      enable_merge_job: true
