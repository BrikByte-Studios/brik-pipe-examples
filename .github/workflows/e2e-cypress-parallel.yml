name: "node-ui-example: e2e (cypress parallel)"

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  e2e:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/e2e-test-parallel.yml@main
    with:
      stack: node
      working_directory: "node-ui-example"

      browsers: '["chrome","electron","firefox"]'
      shards: 4
      shards_per_browser: '{"chrome":4,"electron":2,"firefox":2}'
      browser_env_name: "E2E_BROWSER"

      e2e_command: |
        bash "${GITHUB_WORKSPACE}/node-ui-example/scripts/e2e-cypress.sh"

      # IMPORTANT: now points to workspace-root artifacts
      raw_reports_dir: "test-artifacts/e2e/test-results"
      out_root: "test-artifacts"

      upload_artifacts: true
      enable_merge_job: true
      merged_results_out: "test-artifacts/e2e/test-results.json"
      timeout_minutes: 45
