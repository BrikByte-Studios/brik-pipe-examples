name: "CI — Node API Example"

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------
  # 1) Validate brikpipe.build.yml
  # --------------------------------------------------------------
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "node-api-example"
      config-file: "brikpipe.build.yml"

  # --------------------------------------------------------------
  # 2) Node CI (build, lint, install).
  # --------------------------------------------------------------
  node-ci:
    name: "Node: Build & Test"
    uses: BrikByte-Studios/.github/.github/workflows/template-node-ci.yml@main
    needs: config-validate
    with:
      node-version: "20"
      project-path: "node-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # --------------------------------------------------------------
  # 3) Tests (sharded) — uploads per-shard coverage artifacts.
  # --------------------------------------------------------------
  tests:
    name: "Node: Unit Tests + Coverage"
    needs: node-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-node.yml@main
    with:
      node-version: "20"
      working-directory: "node-api-example"
      # governed parallelism (clamped to caps in .github/actions/matrix-plan/parallel-matrix.yml):
      override_shards: "4"
      flaky_detect: "true"
      # matrix_config_path: ""   # leave empty to use default config inside .github repo
  
  publish-flaky-report:
    name: "Publish Flaky Stability Report"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all flaky shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-audit-*
          path: .audit-merge
          merge-multiple: true

      - name: Download JUnit shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: .junit-merge
          merge-multiple: true

      - name: Download flaky evidence artifacts (per shard)
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-python-shard*
          path: .flaky-evidence
          merge-multiple: true
      - name: Merge flaky evidence + JUnit into leaderboard
        run: |
          set -euo pipefail
          mkdir -p out/flaky

          python - << 'PY'
          import json
          from pathlib import Path
          from collections import defaultdict
          import xml.etree.ElementTree as ET

          evidence_root = Path(".flaky-evidence")
          junit_root = Path(".junit-merge")
          audit_root = Path(".audit-merge")

          def norm_suite(s: str) -> str:
              s = (s or "").strip().lower()
              if "unit" in s: return "unit"
              if "integration" in s: return "integration"
              if "e2e" in s: return "e2e"
              return s or "unknown"

          # -------------------------------------------------------
          # 1) Load totals from per-shard summary.normalized.json
          # -------------------------------------------------------
          totals = defaultdict(lambda: {"pass":0,"fail":0,"runs":0})
          for p in evidence_root.rglob("summary.normalized.json"):
              d = json.loads(p.read_text(encoding="utf-8"))
              suite = norm_suite(d.get("suite") or "unit")
              totals[suite]["pass"] += int(d.get("pass_count", 0))
              totals[suite]["fail"] += int(d.get("fail_count", 0))
              totals[suite]["runs"] += int(d.get("total_attempts", 0))

          if not totals:
              raise SystemExit("ERROR: No summary.normalized.json found. Download pattern should be flaky-python-shard* and shard jobs must upload out/flaky/.")

          # -------------------------------------------------------
          # 2) Parse JUnit for failing test names (per suite)
          # -------------------------------------------------------
          failed_tests_by_suite = defaultdict(set)
          junit_files = list(junit_root.rglob("junit.xml")) + list(junit_root.rglob("*.xml"))

          for jf in junit_files:
              try:
                  root = ET.parse(jf).getroot()
                  suites = root.findall("testsuite") if root.tag == "testsuites" else ([root] if root.tag == "testsuite" else [])
                  for ts in suites:
                      suite_name = norm_suite(ts.get("name") or ts.get("classname") or "unit")
                      for tc in ts.findall(".//testcase"):
                          classname = tc.get("classname") or ""
                          name = tc.get("name") or ""
                          full = f"{classname}::{name}" if classname else name
                          if tc.find("failure") is not None or tc.find("error") is not None:
                              if full:
                                  failed_tests_by_suite[suite_name].add(full)
              except Exception:
                  pass

          # -------------------------------------------------------
          # 3) Use audit ledger for metadata (optional)
          #    (If missing, we still produce correct totals.)
          # -------------------------------------------------------
          meta = {}
          for p in audit_root.rglob("metadata.json"):
              try:
                  meta = json.loads(p.read_text(encoding="utf-8"))
                  break
              except Exception:
                  pass

          # -------------------------------------------------------
          # 4) Build merged rows
          # -------------------------------------------------------
          rows = []
          for suite, v in totals.items():
              runs = v["runs"]
              fail = v["fail"]
              pas = v["pass"]
              rate = (fail / runs) if runs else 0.0

              # simple classification (you can replace with policy logic if you want)
              if fail == 0 and runs > 0:
                  classification = "pass"
              elif rate >= 0.7:
                  classification = "quarantine"
              elif rate >= 0.5:
                  classification = "flaky"
              else:
                  classification = "informational"

              failing_tests = sorted(failed_tests_by_suite.get(suite, []))

              if failing_tests:
                  for t in failing_tests:
                      rows.append({
                          "suite": suite,
                          "test_name": t,
                          "pass_count": pas,
                          "fail_count": fail,
                          "total_attempts": runs,
                          "fail_rate": round(rate, 4),
                          "classification": classification,
                          "run_id": meta.get("run_id"),
                          "repo": meta.get("repo"),
                      })
              else:
                  rows.append({
                      "suite": suite,
                      "test_name": None,
                      "pass_count": pas,
                      "fail_count": fail,
                      "total_attempts": runs,
                      "fail_rate": round(rate, 4),
                      "classification": classification,
                      "run_id": meta.get("run_id"),
                      "repo": meta.get("repo"),
                  })

          out = Path("out/flaky")
          out.mkdir(parents=True, exist_ok=True)
          (out / "flaky-merged.json").write_text(json.dumps(rows, indent=2), encoding="utf-8")

          md = []
          md.append("# Flaky Stability Report (Merged)")
          md.append("")
          md.append("| suite | test | classification | fail_rate | fail_count | pass_count | total_attempts |")
          md.append("|---|---|---:|---:|---:|---:|---:|")
          for x in sorted(rows, key=lambda r: (r["fail_rate"], r["fail_count"]), reverse=True)[:20]:
              md.append(f"| {x['suite']} | {x['test_name'] or '(suite-level)'} | {x['classification']} | {x['fail_rate']} | {x['fail_count']} | {x['pass_count']} | {x['total_attempts']} |")
          (out / "flaky-merged.md").write_text("\n".join(md), encoding="utf-8")

          print("✅ wrote out/flaky/flaky-merged.json and out/flaky/flaky-merged.md")
          PY

      - name: Upload flaky stability report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-stability-report
          path: out/flaky/
          retention-days: 30

  # --------------------------------------------------------------
  # 3.5) Merge shard coverage artifacts -> canonical node-api-example/out/coverage.json
  #
  # NOTE (v1):
  #   This picks ONE shard’s coverage.json deterministically (prefers shard1).
  #   True aggregation needs a real merge step (e.g., merge raw coverage inputs).
  # --------------------------------------------------------------
  merge-coverage:
    name: "Merge coverage shards"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download all Node coverage shard artifacts"
        uses: actions/download-artifact@v4
        with:
          # test-node.yml uploads: coverage-node-shard${N}
          pattern: "coverage-node-shard*"
          path: "node-api-example/.artifacts/coverage"
          merge-multiple: true

      - name: "Select canonical coverage.json"
        working-directory: "node-api-example"
        run: |
          set -euo pipefail
          mkdir -p out

          echo "[MERGE] Listing downloaded files:"
          find .artifacts/coverage -maxdepth 12 -type f -print || true

          # Candidates (supports both flattened and nested, and both formats)
          mapfile -t candidates < <(
            find .artifacts/coverage -type f \( -path "*/out/coverage.json" -o -name "coverage.json" \) -print
          )

          if [[ ${#candidates[@]} -eq 0 ]]; then
            echo "[MERGE] ERROR: No coverage file found under .artifacts/coverage"
            exit 1
          fi

          best=""
          best_val="-1"
          best_kind="2" # 0 = prefer */out/coverage.json, 1 = coverage.json, 2 = unknown

          for f in "${candidates[@]}"; do
            kind="1"
            if [[ "$f" == *"/out/coverage.json" ]]; then kind="0"; fi

            # Parse JSON safely (no require(), avoids ESM/CJS gotchas)
            val="$(node -e "
              const fs=require('fs');
              const p=process.argv[1];
              try{
                const j=JSON.parse(fs.readFileSync(p,'utf8'));
                const line=(j.summary && typeof j.summary.line === 'number') ? j.summary.line : -1;
                process.stdout.write(String(line));
              }catch(e){
                process.stdout.write('-1');
              }
            " "$f")"

            echo "[MERGE] candidate: $f kind=$kind line=$val"

            # Primary: highest line coverage
            if awk "BEGIN { exit !($val > $best_val) }"; then
              best="$f"; best_val="$val"; best_kind="$kind"
              continue
            fi

            # Secondary: if equal line coverage, prefer kind (out/coverage.json)
            if awk "BEGIN { exit !($val == $best_val) }"; then
              if awk "BEGIN { exit !($kind < $best_kind) }"; then
                best="$f"; best_kind="$kind"
                continue
              fi
              # Tertiary: stable tie-breaker by path
              if [[ -n "$best" && "$f" < "$best" ]]; then
                best="$f"
              fi
            fi
          done

          if [[ -z "$best" ]]; then
            echo "[MERGE] ERROR: Could not select a best coverage file (all invalid?)"
            echo "[MERGE] Dumping first 60 lines of candidates:"
            for f in "${candidates[@]}"; do
              echo "---- $f ----"
              head -n 60 "$f" || true
            done
            exit 1
          fi

          echo "[MERGE] Selected: $best (line=$best_val)"
          cp "$best" out/coverage.json

          echo "[MERGE] Final node-api-example/out/coverage.json:"
          ls -la out || true
          head -n 80 out/coverage.json || true

      - name: "Upload merged coverage artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-node-merged"
          path: |
            node-api-example/out/coverage.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

  # --------------------------------------------------------------
  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  # --------------------------------------------------------------
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: merge-coverage
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      working-directory: "node-api-example"
      coverage-file: "./out/coverage.json"
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"
      coverage-artifact-name: "coverage-node-merged"

  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*).
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: merge-coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # IMPORTANT:
      # Download into node-api-example (not node-api-example/out),
      # because the artifact likely contains out/coverage.json inside it
      - name: "Download merged coverage artifact"
        uses: actions/download-artifact@v4
        with:
          name: "coverage-node-merged"
          path: "."

      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: node-api-example
          junit: out/junit.xml
          coverage: out/coverage.json
          audit-root: .audit
          runtime: node@20
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-node"
          upload-to-blob: "true"
          blob-target: "s3://brikbyte-audit/unit-tests/node-api-example"
