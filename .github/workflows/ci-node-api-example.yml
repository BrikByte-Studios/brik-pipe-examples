name: "CI — Node API Example"

on:
  push:
    branches:
      - main
      - master
    paths:
      - "node-api-example/**"
      - ".github/workflows/ci-node-api-example.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "node-api-example/**"
      - ".github/workflows/ci-node-api-example.yml"

jobs:
  # --------------------------------------------------------------
  # 1) Validate brikpipe.build.yml
  # --------------------------------------------------------------
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "node-api-example"
      config-file: "brikpipe.build.yml"
      # schema-file left as default: ".github/schemas/brikpipe-build.schema.json"

  # --------------------------------------------------------------
  # 2) Node CI (build, lint, install)
  # --------------------------------------------------------------
  node-ci:
    name: "Node: Build & Test"
    uses: BrikByte-Studios/.github/.github/workflows/template-node-ci.yml@main
    needs: config-validate
    with:
      node-version: "20"
      project-path: "node-api-example"
      force-cache-refresh: "false"
    secrets: inherit
  
  # --------------------------------------------------------------
  # 3) Tests — generates coverage.json + uploads artifact.
  # --------------------------------------------------------------
  tests:
    name: "Node: Unit Tests + Coverage"
    needs: node-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-node.yml@main
    with:
      node-version: "20"
      working-directory: "node-api-example"

  # --------------------------------------------------------------
  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  # --------------------------------------------------------------
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: tests
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      working-directory: "node-api-example"
      coverage-file: "./out/coverage.json"
      policy-file: ".governance/tests.yml"
      baseline-file: ".audit/coverage-baseline.json"
      coverage-artifact-name: "coverage-node"

  
  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  #    - Uses composite action:
  #        BrikByte-Studios/.github/.github/actions/audit-export@main
  #    - Repos:
  #        • Implemented in: BrikByte-Studios/.github
  #        • Consumed by:   BrikByte-Studios/brik-pipe-examples
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download coverage + (optionally) JUnit into node-api-example/out/
      # The tests workflow should upload an artifact named "coverage-node"
      # containing at least:
      #   node-api-example/out/coverage.json
      #   node-api-example/out/junit.xml   (if JUnit is produced)
      - name: Download coverage + JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-node
          path: node-api-example

      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: node-api-example
          junit: out/junit.xml
          coverage: out/coverage.json
          audit-root: .audit
          runtime: node@20
          duration-seconds: ""
          # If you later plumb a measured duration from tests, pass it here:
          # duration-seconds: ${{ env.TEST_DURATION_SECONDS }}

      - name: Upload unit test audit bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-audit-node
          path: node-api-example/.audit/
          if-no-files-found: ignore


