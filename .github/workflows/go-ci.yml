name: "Example: go ci (Build + unit test)"

on: [push, pull_request]

jobs:
  build:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/build.yml@main
    with:
      stack: "go"
      working_directory: "go-api-example"
      runtime_version: ""               # or "1.22.x" if you want explicit

      run_lint: true
      run_tests: true
      lint_command: "make lint"
      test_command: "make test"
      build_command: "make build"

      upload_artifacts: true
      artifact_paths: "bin/**,out/**,coverage.out"

      # Cache (PIPE-CORE-1.3)
      enable_cache: true
      cache_bust: ""
      allow_cache_write: true
      go_cache_mode: "deps+build-cache"

  unit-tests:
    # Keep your advanced enforcement / coverage logic as-is
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test-go.yml@main
    with:
      working_directory: "go-api-example"
      go_version: "1.22.x"
      test_command: "make test"
      coverage_mode: "optional"
      enforcement_mode: "warn"
