name: "Example: go ci (Build + unit test)"

on: [push, pull_request]

jobs:
  build:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/build-go.yml@main
    with:
      working_directory: "go-api-example"
      runtime_version: ""               # or "20" if you want explicit
      run_lint: true
      run_tests: true
      lint_command: "make lint"
      test_command: "make test"
      build_command: "make build"
      upload_artifacts: true
      artifact_paths: "bin/**,out/**,coverage.out"

  unit-tests:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test-go.yml@main
    with:
      working_directory: "go-api-example"
      go_version: "1.22.x"
      test_command: "make test"
      coverage_mode: "optional"
      enforcement_mode: "warn"