# E2E Playwright workflow scoped to the node-ui-example service.
#
# Responsibilities:
# - Trigger Playwright E2E tests whenever node-ui-example changes.
# - Delegate actual E2E execution to the reusable workflow in BrikByte-Studios/.github.
# - Start the app under test (docker compose) when running in CI.
# - Run cross-browser Playwright E2E and export .audit evidence via the shared exporter.
#
# Assumptions:
# - Reusable workflow exists at:
#     BrikByte-Studios/.github/.github/workflows/e2e-playwright.yml.
# - Reusable workflow inputs include:
#     start_app, app_compose_file, app_service_workdir, target_url, health_url, service_workdir, etc.

name: "E2E - Playwright (node-ui-example)"

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "node-ui-example/**"
      - ".github/workflows/e2e-playwright-demo.yml"
  push:
    branches: [ main ]
    paths:
      - "node-ui-example/**"
      - ".github/workflows/e2e-playwright-demo.yml"

jobs:
  playwright-e2e:
    uses: BrikByte-Studios/.github/.github/workflows/e2e-playwright.yml@main
    with:
      # ----------------------------------------------------------
      # App under test
      # ----------------------------------------------------------
      target_url: "http://localhost:3000"
      health_url: "http://localhost:3000/health"

      # ----------------------------------------------------------
      # Playwright project location
      # ----------------------------------------------------------
      service_workdir: "node-ui-example"

      # ----------------------------------------------------------
      # App lifecycle (localhost CI mode) — docker compose
      # ----------------------------------------------------------
      start_app: true
      app_service_workdir: "node-ui-example"
      # IMPORTANT:
      # - This file must exist inside node-ui-example/
      # - It must expose the app on localhost:3000 on the GitHub runner
      app_compose_file: "docker-compose.e2e.yml"
      app_wait_seconds: 120

      # ----------------------------------------------------------
      # Browser coverage
      # ----------------------------------------------------------
      enable_firefox: true
      enable_webkit: false

      # ----------------------------------------------------------
      # Playwright tuning
      # ----------------------------------------------------------
      workers: "50%"
      retries: 1
      trace_mode: "on-first-retry"

      # Optional grep filter (passed via env in your reusable workflow if supported)
      # If your reusable workflow doesn’t implement grep yet, keep this empty.
      # (It is safe to pass; it just won’t be used.)
      # spec_pattern: ""

      # ----------------------------------------------------------
      # Artifact / audit controls
      # ----------------------------------------------------------
      artifact_name: "playwright-ui-e2e"
      e2e_video: true
      e2e_trace: true
      e2e_artifacts_always: true

      # ----------------------------------------------------------
      # Safety switches.
      # ----------------------------------------------------------
      job_timeout_minutes: 30

      override_shards: 6
      browsers: chromium,firefox
      flaky_detect: "true"

  publish-flaky-report:
    name: "Publish Flaky Stability Report"
    needs: playwright-e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all flaky shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-audit-*
          path: .audit-merge
          merge-multiple: true

      - name: Download JUnit shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: .junit-merge
          merge-multiple: true

      - name: Download flaky evidence artifacts (per shard)
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-node-shard*
          path: .flaky-evidence
          merge-multiple: true
      - name: Merge flaky evidence + JUnit into leaderboard
        run: |
          set -euo pipefail
          mkdir -p out/flaky

          python - << 'PY'
          import json
          from pathlib import Path
          from collections import defaultdict
          import xml.etree.ElementTree as ET

          evidence_root = Path(".flaky-evidence")
          junit_root = Path(".junit-merge")
          audit_root = Path(".audit-merge")

          def norm_suite(s: str) -> str:
              s = (s or "").strip().lower()
              if "unit" in s: return "unit"
              if "integration" in s: return "integration"
              if "e2e" in s: return "e2e"
              return s or "unknown"

          # -------------------------------------------------------
          # 1) Load totals from per-shard summary.normalized.json
          # -------------------------------------------------------
          totals = defaultdict(lambda: {"pass":0,"fail":0,"runs":0})
          for p in evidence_root.rglob("summary.normalized.json"):
              d = json.loads(p.read_text(encoding="utf-8"))
              suite = norm_suite(d.get("suite") or "unit")
              totals[suite]["pass"] += int(d.get("pass_count", 0))
              totals[suite]["fail"] += int(d.get("fail_count", 0))
              totals[suite]["runs"] += int(d.get("total_attempts", 0))

          if not totals:
              raise SystemExit("ERROR: No summary.normalized.json found. Download pattern should be flaky-python-shard* and shard jobs must upload out/flaky/.")

          # -------------------------------------------------------
          # 2) Parse JUnit for failing test names (per suite)
          # -------------------------------------------------------
          failed_tests_by_suite = defaultdict(set)
          junit_files = list(junit_root.rglob("junit.xml")) + list(junit_root.rglob("*.xml"))

          for jf in junit_files:
              try:
                  root = ET.parse(jf).getroot()
                  suites = root.findall("testsuite") if root.tag == "testsuites" else ([root] if root.tag == "testsuite" else [])
                  for ts in suites:
                      suite_name = norm_suite(ts.get("name") or ts.get("classname") or "unit")
                      for tc in ts.findall(".//testcase"):
                          classname = tc.get("classname") or ""
                          name = tc.get("name") or ""
                          full = f"{classname}::{name}" if classname else name
                          if tc.find("failure") is not None or tc.find("error") is not None:
                              if full:
                                  failed_tests_by_suite[suite_name].add(full)
              except Exception:
                  pass

          # -------------------------------------------------------
          # 3) Use audit ledger for metadata (optional)
          #    (If missing, we still produce correct totals.)
          # -------------------------------------------------------
          meta = {}
          for p in audit_root.rglob("metadata.json"):
              try:
                  meta = json.loads(p.read_text(encoding="utf-8"))
                  break
              except Exception:
                  pass

          # -------------------------------------------------------
          # 4) Build merged rows
          # -------------------------------------------------------
          rows = []
          for suite, v in totals.items():
              runs = v["runs"]
              fail = v["fail"]
              pas = v["pass"]
              rate = (fail / runs) if runs else 0.0

              # simple classification (you can replace with policy logic if you want)
              if fail == 0 and runs > 0:
                  classification = "pass"
              elif rate >= 0.7:
                  classification = "quarantine"
              elif rate >= 0.5:
                  classification = "flaky"
              else:
                  classification = "informational"

              failing_tests = sorted(failed_tests_by_suite.get(suite, []))

              if failing_tests:
                  for t in failing_tests:
                      rows.append({
                          "suite": suite,
                          "test_name": t,
                          "pass_count": pas,
                          "fail_count": fail,
                          "total_attempts": runs,
                          "fail_rate": round(rate, 4),
                          "classification": classification,
                          "run_id": meta.get("run_id"),
                          "repo": meta.get("repo"),
                      })
              else:
                  rows.append({
                      "suite": suite,
                      "test_name": None,
                      "pass_count": pas,
                      "fail_count": fail,
                      "total_attempts": runs,
                      "fail_rate": round(rate, 4),
                      "classification": classification,
                      "run_id": meta.get("run_id"),
                      "repo": meta.get("repo"),
                  })

          out = Path("out/flaky")
          out.mkdir(parents=True, exist_ok=True)
          (out / "flaky-merged.json").write_text(json.dumps(rows, indent=2), encoding="utf-8")

          md = []
          md.append("# Flaky Stability Report (Merged)")
          md.append("")
          md.append("| suite | test | classification | fail_rate | fail_count | pass_count | total_attempts |")
          md.append("|---|---|---:|---:|---:|---:|---:|")
          for x in sorted(rows, key=lambda r: (r["fail_rate"], r["fail_count"]), reverse=True)[:20]:
              md.append(f"| {x['suite']} | {x['test_name'] or '(suite-level)'} | {x['classification']} | {x['fail_rate']} | {x['fail_count']} | {x['pass_count']} | {x['total_attempts']} |")
          (out / "flaky-merged.md").write_text("\n".join(md), encoding="utf-8")

          print("✅ wrote out/flaky/flaky-merged.json and out/flaky/flaky-merged.md")
          PY

      - name: Upload flaky stability report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-stability-report
          path: out/flaky/
          retention-days: 30