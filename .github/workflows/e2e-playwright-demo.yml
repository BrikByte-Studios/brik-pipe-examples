name: "Example: Playwright E2E (BrikByteOS)"

on:
  push:
  pull_request:

jobs:
  e2e:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/e2e-playwright.yml@main
    with:
      # Project layout
      working_directory: "node-ui-example"

      # App under test
      base_url: "http://localhost:3000"

      # App boot (local dev server)
      enable_app_boot: true
      app_install_command: "npm ci"
      app_start_command: "npm start"
      app_ready_url: "http://localhost:3000/login"

      # Playwright execution
      command: "npm run test:e2e"

      # Evidence + diagnostics
      diagnostics: "full"
      artifact_mode: "always"

      # Canonical evidence contract
      report_dir: "playwright-report"
      results_dir: "test-results"
      evidence_dir: "test-artifacts/e2e/raw"
      raw_reports_dir: "test-artifacts/e2e/test-results"
      normalized_results_out: "test-artifacts/e2e/test-results.json"

      # Upload policy
      upload_artifacts: true
      artifact_retention_days: 7
      timeout_minutes: 20

      # Flaky detection — opt-in repeat-run
      flaky_detection_enabled: true
      repeat_runs: 5
      repeat_out_dir: "test-results/flaky/e2e"
      repeat_results_glob: "test-artifacts/e2e/test-results/**/*.xml"
      repeat_max_runs: 10
      repeat_max_wall_clock_minutes: 45

  flaky-trends:
    name: "Flaky trends (main only)"
    if: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Flaky trends
        uses: BrikByte-Studios/brik-pipe-actions/.github/actions/flaky-trend-aggregator@main
        with:
          enabled: "true"
          windows: "7,30"
          top_n: "10"
          branch: "main"
          event_filter: "push"
          artifact_name_prefix: "flaky-summary-run-"
          max_runs_scan: "60"
          out_dir: "test-results/flaky/trends"
          stable_max_fail_rate: "0.05"
          flaky_max_fail_rate: "0.40"
          write_markdown: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload flaky trends outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "flaky-trends-${{ github.run_id }}"
          path: test-results/flaky/trends/**
          if-no-files-found: warn
          retention-days: 30

