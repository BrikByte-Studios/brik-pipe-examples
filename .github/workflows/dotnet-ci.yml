name: "Example: dotnet ci (Build + unit test)"

on: [push, pull_request]

jobs:
  build:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/build.yml@main
    with:
      stack: "dotnet"
      working_directory: "dotnet-api-example"
      runtime_version: ""               # or "8.0.x" if you want explicit

      run_lint: true
      run_tests: true
      lint_command: "make lint"
      test_command: "make test"
      build_command: "make build"

      upload_artifacts: true
      artifact_paths: "TestResults/**,out/**,**/bin/**,**/obj/**"

      # Cache (PIPE-CORE-1.3)
      enable_cache: true
      cache_bust: ""
      allow_cache_write: true
      dotnet_cache_mode: "packages-only" # or "packages+http"

  unit-tests:
    # Keep your advanced enforcement / coverage logic as-is
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test-dotnet.yml@main
    with:
      working_directory: "dotnet-api-example"
      dotnet_version: "8.0.x"
      test_command: "make test"
      coverage_mode: "optional"
      enforcement_mode: "warn"
