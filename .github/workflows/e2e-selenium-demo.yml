# ==============================================================================
# Demo: Selenium Grid E2E (node-ui-example + Java runner)
# ==============================================================================
#
# PURPOSE
# -------
# CI demo proving:
# - UI app can be started deterministically via Docker Compose
# - Selenium Grid can be started deterministically via Docker Compose
# - A Java Selenium runner can execute RemoteWebDriver tests against the Grid
#
# FILES EXPECTED
# --------------
# - node-ui-example/docker-compose.e2e.yml
# - brik-pipe-examples/docker-compose.selenium.yml
# - java-selenium-runner-example/
#
# NETWORKING (important)
# ---------------------
# - Grid publishes 4444 on the host -> Java runner uses http://localhost:4444/wd/hub
# - UI publishes 3000 on the host -> Selenium *nodes* must reach the host app.
# - We use host gateway mapping so containers can resolve host.docker.internal on Linux.
#
# ==============================================================================

name: "E2E - Selenium Grid (Demo)"

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "brik-pipe-examples/**"
      - "java-selenium-runner-example/**"
      - "node-ui-example/**"
      - ".github/workflows/e2e-selenium-demo.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "brik-pipe-examples/**"
      - "java-selenium-runner-example/**"
      - "node-ui-example/**"
      - ".github/workflows/e2e-selenium-demo.yml"

jobs:
  selenium-grid-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GRID_COMPOSE_FILE: "docker-compose.selenium.yml"
      APP_COMPOSE_FILE: "node-ui-example/docker-compose.e2e.yml"

      # Java runner (host) -> Selenium hub published on host.
      SELENIUM_REMOTE_URL: "http://localhost:4444/wd/hub"

      # Browser (inside selenium node container) -> app service on the compose network.
      E2E_TARGET_URL: "http://app:3000"

      ENABLE_EDGE: "false"

    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4

      - name: "Sanity: show compose files"
        run: |
          set -euo pipefail
          test -f "${GRID_COMPOSE_FILE}"
          test -f "${APP_COMPOSE_FILE}"
          echo "[OK] Found ${GRID_COMPOSE_FILE}"
          echo "[OK] Found ${APP_COMPOSE_FILE}"

      # ------------------------------------------------------------------------
      # Start UI + Grid in one shared compose project
      # ------------------------------------------------------------------------
      - name: "Start UI + Selenium Grid (single compose project)"
        run: |
          set -euo pipefail
          echo "[COMPOSE] Bringing up app + grid..."
          if [ "${ENABLE_EDGE}" = "true" ]; then
            docker compose \
              -f "${APP_COMPOSE_FILE}" \
              -f "${GRID_COMPOSE_FILE}" \
              --profile edge \
              up -d --build
          else
            docker compose \
              -f "${APP_COMPOSE_FILE}" \
              -f "${GRID_COMPOSE_FILE}" \
              up -d --build
          fi

          docker ps -a

      # ------------------------------------------------------------------------
      # Wait for UI readiness (from host)
      # ------------------------------------------------------------------------
      - name: "Wait for UI readiness (/health)"
        run: |
          set -euo pipefail
          APP_HEALTH="http://localhost:3000/health"
          timeout=120
          elapsed=0

          echo "[APP] Waiting for ${APP_HEALTH}"

          while ! curl -fsS "${APP_HEALTH}" > /dev/null; do
            sleep 5
            elapsed=$((elapsed + 5))
            echo "[APP] Not ready yet (${elapsed}s)..."

            if [ "${elapsed}" -ge "${timeout}" ]; then
              echo "[APP] ERROR: UI did not become healthy in time."
              docker compose -f "${APP_COMPOSE_FILE}" -f "${GRID_COMPOSE_FILE}" logs --no-color || true
              exit 1
            fi
          done

          echo "[APP] ✅ UI is healthy."

      # ------------------------------------------------------------------------
      # Wait for Grid readiness (from host)
      # ------------------------------------------------------------------------
      - name: "Wait for Grid readiness"
        run: |
          set -euo pipefail
          HUB_STATUS="http://localhost:4444/wd/hub/status"
          timeout=120
          elapsed=0

          echo "[GRID] Waiting for hub status at ${HUB_STATUS}"

          while ! curl -fsS "${HUB_STATUS}" > /dev/null; do
            sleep 5
            elapsed=$((elapsed + 5))
            echo "[GRID] Hub not ready yet (${elapsed}s)..."

            if [ "${elapsed}" -ge "${timeout}" ]; then
              echo "[GRID] ERROR: Hub not ready in time."
              docker compose -f "${APP_COMPOSE_FILE}" -f "${GRID_COMPOSE_FILE}" logs --no-color || true
              exit 1
            fi
          done

          echo "[GRID] ✅ Hub is responding."

      # ------------------------------------------------------------------------
      # Debug proof: selenium node can resolve app (DNS + health)
      # ------------------------------------------------------------------------
      - name: "Debug: can selenium node resolve app?"
        run: |
          set -euo pipefail
          echo "[DEBUG] Checking DNS + HTTP from inside chrome node..."
          CHROME_ID="$(docker ps -q --filter "name=chrome" | head -n 1)"
          if [ -z "${CHROME_ID}" ]; then
            echo "[DEBUG] ERROR: chrome container not found"
            docker ps -a
            exit 1
          fi

          docker exec -i "${CHROME_ID}" sh -lc "getent hosts app || true"
          docker exec -i "${CHROME_ID}" sh -lc "wget -qO- http://app:3000/health || true"

      # ------------------------------------------------------------------------
      # Run Java runner (host process)
      # ------------------------------------------------------------------------
      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: "Run Java Selenium smoke tests"
        working-directory: "java-selenium-runner-example"
        env:
          SELENIUM_REMOTE_URL: ${{ env.SELENIUM_REMOTE_URL }}
          E2E_TARGET_URL: ${{ env.E2E_TARGET_URL }}
          BROWSER: "chrome"
        run: |
          set -euo pipefail
          echo "[RUNNER] SELENIUM_REMOTE_URL=${SELENIUM_REMOTE_URL}"
          echo "[RUNNER] E2E_TARGET_URL=${E2E_TARGET_URL}"
          echo "[RUNNER] BROWSER=${BROWSER}"
          mvn -q -DskipTests=false test

      # ------------------------------------------------------------------------
      # Evidence collection (always)
      # ------------------------------------------------------------------------
      - name: "Collect logs"
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .audit/selenium-demo

          echo "[EVIDENCE] Combined compose logs..."
          docker compose -f "${APP_COMPOSE_FILE}" -f "${GRID_COMPOSE_FILE}" logs --no-color \
            > .audit/selenium-demo/compose.log || true

          echo "[EVIDENCE] docker ps..."
          docker ps -a > .audit/selenium-demo/docker-ps.txt || true

          echo "[EVIDENCE] hub status..."
          curl -fsS "http://localhost:4444/wd/hub/status" > .audit/selenium-demo/hub-status.json || true

      - name: "Upload evidence"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "selenium-demo-evidence"
          path: ".audit/selenium-demo"
          if-no-files-found: ignore

      # ------------------------------------------------------------------------
      # Teardown (always)
      # ------------------------------------------------------------------------
      - name: "Teardown"
        if: always()
        run: |
          docker compose -f "${APP_COMPOSE_FILE}" -f "${GRID_COMPOSE_FILE}" down -v || true