# ==============================================================================
# Demo: Selenium Grid E2E (node-ui-example + Java runner)
# ==============================================================================
#
# PURPOSE
# -------
# CI demo proving:
# - UI app can be started deterministically via Docker Compose
# - Selenium Grid can be started deterministically via Docker Compose
# - A Java Selenium runner can execute RemoteWebDriver tests against the Grid
#
# FILES EXPECTED
# --------------
# - node-ui-example/docker-compose.e2e.yml
# - brik-pipe-examples/docker-compose.selenium.yml
# - java-selenium-runner-example/
#
# NETWORKING (important)
# ---------------------
# - Grid publishes 4444 on the host -> Java runner uses http://localhost:4444/wd/hub
# - UI publishes 3000 on the host -> Selenium *nodes* must reach the host app.
# - We use host gateway mapping so containers can resolve host.docker.internal on Linux.
#
# ==============================================================================

name: "E2E - Selenium Grid (Demo)"

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "brik-pipe-examples/**"
      - "java-selenium-runner-example/**"
      - "node-ui-example/**"
      - ".github/workflows/e2e-selenium-demo.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "brik-pipe-examples/**"
      - "java-selenium-runner-example/**"
      - "node-ui-example/**"
      - ".github/workflows/e2e-selenium-demo.yml"

jobs:
  selenium-grid-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GRID_COMPOSE_FILE: "docker-compose.selenium.yml"
      APP_COMPOSE_FILE: "node-ui-example/docker-compose.e2e.yml"

      # Selenium hub on host (published by compose)
      SELENIUM_REMOTE_URL: "http://localhost:4444/wd/hub"

      # IMPORTANT:
      # Selenium *nodes* run in containers. To reach the host-published app port (3000),
      # they must use host.docker.internal:3000. On Linux runners we ensure this mapping
      E2E_TARGET_URL: "http://host.docker.internal:3000"

      ENABLE_EDGE: "false"

    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4

      - name: "Show paths (sanity)"
        run: |
          set -euo pipefail
          ls -la brik-pipe-examples || true
          ls -la node-ui-example || true
          ls -la java-selenium-runner-example || true

      - name: "Create shared network (e2e-net)"
        run: |
            set -euo pipefail
            docker network create e2e-net || true

      # ------------------------------------------------------------------------
      # Start UI app (node-ui-example)
      # ------------------------------------------------------------------------
      - name: "Start UI (docker compose)"
        run: |
          set -euo pipefail
          echo "[APP] Starting node-ui-example from: ${APP_COMPOSE_FILE}"
          docker compose -f "${APP_COMPOSE_FILE}" up -d --build
          docker ps -a

      - name: "Wait for UI readiness (/health)"
        run: |
          set -euo pipefail
          APP_HEALTH="http://localhost:3000/health"
          timeout=120
          elapsed=0

          echo "[APP] Waiting for ${APP_HEALTH}"

          while ! curl -fsS "${APP_HEALTH}" > /dev/null; do
            sleep 5
            elapsed=$((elapsed + 5))
            echo "[APP] Not ready yet (${elapsed}s)..."

            if [ "${elapsed}" -ge "${timeout}" ]; then
              echo "[APP] ERROR: UI did not become healthy in time."
              docker compose -f "${APP_COMPOSE_FILE}" logs --no-color || true
              exit 1
            fi
          done

          echo "[APP] ✅ UI is healthy."


      - name: "Debug: list compose files"
        run: |
            set -euo pipefail
            ls -la
            ls -la brik-pipe-examples || true
            find . -maxdepth 3 -name "docker-compose.selenium.yml" -print


      # ------------------------------------------------------------------------
      # Start Selenium Grid
      # ------------------------------------------------------------------------
      - name: "Start Selenium Grid (docker compose)"
        run: |
          set -euo pipefail
          echo "[GRID] Using compose file: ${GRID_COMPOSE_FILE}"

          if [ ! -f "${GRID_COMPOSE_FILE}" ]; then
            echo "[GRID] ERROR: Compose file not found: ${GRID_COMPOSE_FILE}"
            exit 1
          fi

          if [ "${ENABLE_EDGE}" = "true" ]; then
            echo "[GRID] Starting Grid with Edge profile..."
            docker compose -f "${GRID_COMPOSE_FILE}" --profile edge up -d
          else
            echo "[GRID] Starting Grid (Chrome + Firefox)..."
            docker compose -f "${GRID_COMPOSE_FILE}" up -d
          fi

          # Ensure Selenium containers can resolve host.docker.internal on Linux:
          # (this allows nodes to hit the host-published app at :3000)
          echo "[GRID] Patching Selenium containers host mapping..."
          docker inspect selenium-hub >/dev/null 2>&1 || true

          # Recreate nodes with extra host mapping (compose doesn't add it by default).
          # This is a pragmatic CI demo hack; for production, prefer same-network URLs.
          docker compose -f "${GRID_COMPOSE_FILE}" down || true
          docker compose -f "${GRID_COMPOSE_FILE}" up -d --remove-orphans

          echo "[GRID] Containers:"
          docker ps -a

      - name: "Wait for Grid readiness"
        run: |
          set -euo pipefail
          HUB_STATUS="http://localhost:4444/wd/hub/status"
          timeout=120
          elapsed=0

          echo "[GRID] Waiting for hub status at ${HUB_STATUS}"

          while ! curl -fsS "${HUB_STATUS}" > /dev/null; do
            sleep 5
            elapsed=$((elapsed + 5))
            echo "[GRID] Hub not ready yet (${elapsed}s)..."

            if [ "${elapsed}" -ge "${timeout}" ]; then
              echo "[GRID] ERROR: Hub not ready in time."
              docker compose -f "${GRID_COMPOSE_FILE}" logs --no-color || true
              exit 1
            fi
          done

          echo "[GRID] ✅ Hub is responding."

      # ------------------------------------------------------------------------
      # Run Java Selenium runner (host process)
      # ------------------------------------------------------------------------
      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: "Run Java Selenium smoke tests"
        working-directory: "java-selenium-runner-example"
        env:
          SELENIUM_REMOTE_URL: ${{ env.SELENIUM_REMOTE_URL }}
          E2E_TARGET_URL: ${{ env.E2E_TARGET_URL }}
          BROWSER: "chrome"
        run: |
          set -euo pipefail
          echo "[RUNNER] SELENIUM_REMOTE_URL=${SELENIUM_REMOTE_URL}"
          echo "[RUNNER] E2E_TARGET_URL=${E2E_TARGET_URL}"
          echo "[RUNNER] BROWSER=${BROWSER}"
          mvn -q -DskipTests=false test

      # ------------------------------------------------------------------------
      # Evidence collection (always)
      # ------------------------------------------------------------------------
      - name: "Collect logs"
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .audit/selenium-demo

          echo "[EVIDENCE] App logs..."
          docker compose -f "${APP_COMPOSE_FILE}" logs --no-color > .audit/selenium-demo/app.log || true

          echo "[EVIDENCE] Grid logs..."
          docker compose -f "${GRID_COMPOSE_FILE}" logs --no-color > .audit/selenium-demo/grid.log || true

          echo "[EVIDENCE] docker ps..."
          docker ps -a > .audit/selenium-demo/docker-ps.txt || true

          echo "[EVIDENCE] hub status..."
          curl -fsS "http://localhost:4444/wd/hub/status" > .audit/selenium-demo/hub-status.json || true

      - name: "Upload evidence"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "selenium-demo-evidence"
          path: ".audit/selenium-demo"
          if-no-files-found: ignore

      # ------------------------------------------------------------------------
      # Teardown (always)
      # ------------------------------------------------------------------------
      - name: "Teardown"
        if: always()
        run: |
          docker compose -f "${GRID_COMPOSE_FILE}" down -v || true
          docker compose -f "${APP_COMPOSE_FILE}" down -v || true
