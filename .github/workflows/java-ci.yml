name: "Example: java ci (Build + unit test)"

on: [push, pull_request]

jobs:
  build:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/build.yml@main
    with:
      stack: "java"
      working_directory: "java-api-example"
      runtime_version: ""               # or "17" / "21" if you want explicit
      build_tool: ""                    # or "maven" / "gradle"

      run_lint: true
      run_tests: true
      lint_command: "make lint"
      test_command: "make test"
      build_command: "make build"

      upload_artifacts: true
      artifact_paths: "target/**,out/**"

      # Cache (PIPE-CORE-1.3)
      enable_cache: true
      cache_bust: ""
      allow_cache_write: true

  unit-tests:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test.yml@main
    with:
      stack: "java"
      working_directory: "java-api-example"
      java_version: "17"
      build_tool: "maven"
      test_command: "make test"
      coverage_mode: "optional"
      enforcement_mode: "warn"
