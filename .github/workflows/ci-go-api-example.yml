name: "CI — Go API Example"

on:
  push:
    branches: [ main, master ]
    paths:
      - "go-api-example/**"
      - ".github/workflows/ci-go-api-example.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "go-api-example/**"
      - ".github/workflows/ci-go-api-example.yml"

jobs:
  # 1) Validate brikpipe.build.yml.
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "go-api-example"
      config-file: "brikpipe.build.yml"
      # schema-file left as default: ".github/schemas/brikpipe-build.schema.json"

  # 2) Go CI (build / fmt / vet etc., optional but nice)
  go-ci:
    name: "Go: Build & CI"
    needs: config-validate
    uses: BrikByte-Studios/.github/.github/workflows/template-go-ci.yml@main
    with:
      go-version: "1.22.x"
      project-path: "go-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) Go Tests + Coverage
  tests:
    name: "Go: Unit Tests + Coverage"
    needs: go-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-go.yml@main
    with:
      go-version: "1.22.x"
      working-directory: "go-api-example"

  # --------------------------------------------------------------
  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  # --------------------------------------------------------------
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: tests
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      # Coverage gate MUST run inside the Go project folder
      working-directory: "go-api-example"

      # Path is relative to working-directory
      coverage-file: "./out/coverage.json"

      # Policy and baseline are at repo root → go one level up
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"

      # Artifact uploaded by test-go.yml
      coverage-artifact-name: "coverage-go"
  
  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      # Standard checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download Go coverage + JUnit artifacts (produced in test-go.yml).
      - name: Download coverage + JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-go
          path: go-api-example

      # Run audit-export
      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: go-api-example
          junit: out/junit.xml
          coverage: out/coverage.json
          audit-root: .audit
          runtime: go@1.22
          duration-seconds: ""

      # Upload .audit/<ts>/unit-tests/*
      - name: Upload unit test audit bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-audit-go
          path: go-api-example/.audit/
          if-no-files-found: ignore   # or "error" if you want strict enforcement
          include-hidden-files: true  # IMPORTANT: required because `.audit` is hidden
          compression-level: 6
          overwrite: false
