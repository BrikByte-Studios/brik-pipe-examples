name: "CI — Go API Example"

on:
  push:
    branches: [main, master]
    paths:
      - "go-api-example/**"
      - ".github/workflows/ci-go-api-example.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "go-api-example/**"
      - ".github/workflows/ci-go-api-example.yml"

env:
  GO_VERSION: "1.22.x"
  PROJECT_PATH: "go-api-example"
  COVERAGE_ARTIFACT: "coverage-go"

jobs:
  # --------------------------------------------------------------
  # 1) Validate brikpipe.build.yml
  # --------------------------------------------------------------
  config-validate:
    name: "Config: brikpipe.build.yml"
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: ${{ env.PROJECT_PATH }}
      config-file: "brikpipe.build.yml"

  # --------------------------------------------------------------
  # 2) Go CI (build / fmt / vet / lint)
  # --------------------------------------------------------------
  go-ci:
    name: "Go: Build & CI"
    needs: config-validate
    uses: BrikByte-Studios/.github/.github/workflows/template-go-ci.yml@main
    with:
      go-version: ${{ env.GO_VERSION }}
      project-path: ${{ env.PROJECT_PATH }}
      force-cache-refresh: "false"
    secrets: inherit

  # --------------------------------------------------------------
  # 3) Go Tests + Coverage
  # --------------------------------------------------------------
  tests:
    name: "Go: Unit Tests + Coverage"
    needs: go-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-go.yml@main
    with:
      go-version: ${{ env.GO_VERSION }}
      working-directory: ${{ env.PROJECT_PATH }}

  # --------------------------------------------------------------
  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  # --------------------------------------------------------------
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: tests
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      working-directory: ${{ env.PROJECT_PATH }}
      coverage-file: "./out/coverage.json"

      # policy + baseline live at repo root
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"

      coverage-artifact-name: ${{ env.COVERAGE_ARTIFACT }}

  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download coverage + JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.COVERAGE_ARTIFACT }}
          path: ${{ env.PROJECT_PATH }}

      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: ${{ env.PROJECT_PATH }}
          junit: "out/junit.xml"
          coverage: "out/coverage.json"
          audit-root: ".audit"
          runtime: "go@1.22"
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-go"
          upload-to-blob: "true"
          blob-target: "s3://brikbyte-audit/unit-tests/go-api-example"
