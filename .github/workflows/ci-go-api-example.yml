name: "CI — Go API Example"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1) Validate brikpipe.build.yml
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "go-api-example"
      config-file: "brikpipe.build.yml"
      # schema-file left as default: ".github/schemas/brikpipe-build.schema.json"

  # 2) Go CI (build / fmt / vet etc., optional but nice)
  go-ci:
    name: "Go: Build & CI"
    needs: config-validate
    uses: BrikByte-Studios/.github/.github/workflows/template-go-ci.yml@main
    with:
      go-version: "1.22.x"
      project-path: "go-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) Go Tests + Coverage
  tests:
    name: "Go: Unit Tests + Coverage"
    needs: go-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-go.yml@main
    with:
      go-version: "1.22.x"
      working-directory: "go-api-example"
      flaky_detect: "true"

  publish-flaky-report:
    name: "Publish Flaky Stability Report"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all flaky shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-audit-*
          path: .audit-merge
          merge-multiple: true

      - name: Download JUnit shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: .junit-merge
          merge-multiple: true

      - name: Download flaky evidence artifacts (per shard)
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-go-shard*
          path: .flaky-evidence
          merge-multiple: true
      - name: Merge flaky evidence + JUnit into leaderboard
        run: |
          set -euo pipefail
          mkdir -p out/flaky

          python - << 'PY'
          import json
          from pathlib import Path
          from collections import defaultdict
          import xml.etree.ElementTree as ET

          evidence_root = Path(".flaky-evidence")
          junit_root = Path(".junit-merge")
          audit_root = Path(".audit-merge")

          def norm_suite(s: str) -> str:
              s = (s or "").strip().lower()
              if "unit" in s: return "unit"
              if "integration" in s: return "integration"
              if "e2e" in s: return "e2e"
              return s or "unknown"

          # -------------------------------------------------------
          # 1) Load totals from per-shard summary.normalized.json
          # -------------------------------------------------------
          totals = defaultdict(lambda: {"pass":0,"fail":0,"runs":0})
          for p in evidence_root.rglob("summary.normalized.json"):
              d = json.loads(p.read_text(encoding="utf-8"))
              suite = norm_suite(d.get("suite") or "unit")
              totals[suite]["pass"] += int(d.get("pass_count", 0))
              totals[suite]["fail"] += int(d.get("fail_count", 0))
              totals[suite]["runs"] += int(d.get("total_attempts", 0))

          if not totals:
              raise SystemExit("ERROR: No summary.normalized.json found. Download pattern should be flaky-python-shard* and shard jobs must upload out/flaky/.")

          # -------------------------------------------------------
          # 2) Parse JUnit for failing test names (per suite)
          # -------------------------------------------------------
          failed_tests_by_suite = defaultdict(set)
          junit_files = list(junit_root.rglob("junit.xml")) + list(junit_root.rglob("*.xml"))

          for jf in junit_files:
              try:
                  root = ET.parse(jf).getroot()
                  suites = root.findall("testsuite") if root.tag == "testsuites" else ([root] if root.tag == "testsuite" else [])
                  for ts in suites:
                      suite_name = norm_suite(ts.get("name") or ts.get("classname") or "unit")
                      for tc in ts.findall(".//testcase"):
                          classname = tc.get("classname") or ""
                          name = tc.get("name") or ""
                          full = f"{classname}::{name}" if classname else name
                          if tc.find("failure") is not None or tc.find("error") is not None:
                              if full:
                                  failed_tests_by_suite[suite_name].add(full)
              except Exception:
                  pass

          # -------------------------------------------------------
          # 3) Use audit ledger for metadata (optional)
          #    (If missing, we still produce correct totals.)
          # -------------------------------------------------------
          meta = {}
          for p in audit_root.rglob("metadata.json"):
              try:
                  meta = json.loads(p.read_text(encoding="utf-8"))
                  break
              except Exception:
                  pass

          # -------------------------------------------------------
          # 4) Build merged rows
          # -------------------------------------------------------
          rows = []
          for suite, v in totals.items():
              runs = v["runs"]
              fail = v["fail"]
              pas = v["pass"]
              rate = (fail / runs) if runs else 0.0

              # simple classification (you can replace with policy logic if you want)
              if fail == 0 and runs > 0:
                  classification = "pass"
              elif rate >= 0.7:
                  classification = "quarantine"
              elif rate >= 0.5:
                  classification = "flaky"
              else:
                  classification = "informational"

              failing_tests = sorted(failed_tests_by_suite.get(suite, []))

              if failing_tests:
                  for t in failing_tests:
                      rows.append({
                          "suite": suite,
                          "test_name": t,
                          "pass_count": pas,
                          "fail_count": fail,
                          "total_attempts": runs,
                          "fail_rate": round(rate, 4),
                          "classification": classification,
                          "run_id": meta.get("run_id"),
                          "repo": meta.get("repo"),
                      })
              else:
                  rows.append({
                      "suite": suite,
                      "test_name": None,
                      "pass_count": pas,
                      "fail_count": fail,
                      "total_attempts": runs,
                      "fail_rate": round(rate, 4),
                      "classification": classification,
                      "run_id": meta.get("run_id"),
                      "repo": meta.get("repo"),
                  })

          out = Path("out/flaky")
          out.mkdir(parents=True, exist_ok=True)
          (out / "flaky-merged.json").write_text(json.dumps(rows, indent=2), encoding="utf-8")

          md = []
          md.append("# Flaky Stability Report (Merged)")
          md.append("")
          md.append("| suite | test | classification | fail_rate | fail_count | pass_count | total_attempts |")
          md.append("|---|---|---:|---:|---:|---:|---:|")
          for x in sorted(rows, key=lambda r: (r["fail_rate"], r["fail_count"]), reverse=True)[:20]:
              md.append(f"| {x['suite']} | {x['test_name'] or '(suite-level)'} | {x['classification']} | {x['fail_rate']} | {x['fail_count']} | {x['pass_count']} | {x['total_attempts']} |")
          (out / "flaky-merged.md").write_text("\n".join(md), encoding="utf-8")

          print("✅ wrote out/flaky/flaky-merged.json and out/flaky/flaky-merged.md")
          PY

      - name: Upload flaky stability report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-stability-report
          path: out/flaky/
          retention-days: 30

  # --------------------------------------------------------------
  # 3.5) Merge shard coverage artifacts -> canonical out/coverage.json.
  # --------------------------------------------------------------
  merge-coverage:
    name: "Merge coverage shards"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Go shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-go-shard*"
          path: "go-api-example/.artifacts/coverage"
          merge-multiple: true

      - name: Merge Go coverage.out files (gocovmerge)
        working-directory: "go-api-example"
        run: |
          set -euo pipefail
          mkdir -p out

          ART_DIR=".artifacts/coverage"
          echo "[MERGE] Listing downloaded shard artifacts:"
          find "${ART_DIR}" -maxdepth 8 -type f -print || true

          mapfile -t profiles < <(find "${ART_DIR}" -type f -name "coverage.out" | sort)
          if [[ ${#profiles[@]} -eq 0 ]]; then
            echo "[MERGE] ERROR: No coverage.out files found under ${ART_DIR}"
            exit 1
          fi

          echo "[MERGE] Found ${#profiles[@]} coverage.out files:"
          printf "  - %s\n" "${profiles[@]}"

          if [[ ${#profiles[@]} -eq 1 ]]; then
            echo "[MERGE] Single profile → using as-is"
            cp "${profiles[0]}" coverage.out
          else
            # Install merge tool (choose one)
            go install github.com/wadey/gocovmerge@latest
            export PATH="$(go env GOPATH)/bin:$PATH"

            tmp_merged="coverage.merged.tmp.out"
            gocovmerge "${profiles[@]}" > "${tmp_merged}"

            awk '
              BEGIN { seen_mode=0 }
              /^mode:/ { if (seen_mode==0) { print; seen_mode=1 } next }
              { print }
            ' "${tmp_merged}" > coverage.out
          fi

          echo "[MERGE] coverage.out head:"
          head -n 3 coverage.out || true

          go tool cover -func=coverage.out > coverage-func.txt
          tail -n 8 coverage-func.txt || true

          python - << 'PY'
          import json, os, re
          from pathlib import Path
          from datetime import datetime, timezone

          txt = Path("coverage-func.txt").read_text(encoding="utf-8", errors="replace").splitlines()
          pct = None
          for line in reversed(txt):
              if line.lower().startswith("total:"):
                  m = re.search(r'(\d+(\.\d+)?)%$', line.strip())
                  if m:
                      pct = float(m.group(1))
                      break
          if pct is None:
              raise SystemExit("[MERGE] ERROR: could not find total % in coverage-func.txt")

          out = Path("out"); out.mkdir(parents=True, exist_ok=True)
          cov = {
            "language": "go",
            "tool": "go tool cover",
            "summary": {"line": pct},
            "generated_at": datetime.now(timezone.utc).isoformat().replace("+00:00","Z"),
            "meta": {
              "commit": os.environ.get("GITHUB_SHA"),
              "ref": os.environ.get("GITHUB_REF"),
              "workflow": os.environ.get("GITHUB_WORKFLOW"),
              "job": os.environ.get("GITHUB_JOB"),
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "profiles_count": int(os.environ.get("PROFILES_COUNT", "0") or "0"),
            },
            "files": []
          }
          (out / "coverage.json").write_text(json.dumps(cov, indent=2), encoding="utf-8")
          print("[MERGE] Wrote out/coverage.json summary.line =", pct)
          PY

          echo "[MERGE] out/coverage.json:"
          cat out/coverage.json

      - name: Upload merged coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-go-merged"
          path: |
            go-api-example/out/coverage.json
          if-no-files-found: error
          retention-days: 14


  # --------------------------------------------------------------
  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  # --------------------------------------------------------------
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: merge-coverage
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      working-directory: "go-api-example"
      coverage-file: "./out/coverage.json"
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"
      coverage-artifact-name: "coverage-go-merged"

  
  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: merge-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download merged coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-go-merged
          path: go-api-example/out

      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: go-api-example
          junit: out/junit.xml
          coverage: out/coverage.json
          audit-root: .audit
          runtime: go@1.22
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-go"
          upload-to-blob: "true"
          blob-target: "s3://brikbyte-audit/unit-tests/go-api-example"

