# Benchmark workflow for PIPE-E2E-PLAYWRIGHT-BUILD-001
#
# Purpose:
# - Measure impact of Playwright parallelism/sharding on total E2E duration.
# - Demonstrate that sharded runs achieve ≥ 30% faster wall-clock time
#   compared to a baseline single-worker run.
#
# This is NOT meant to run on every PR; think of it as:
# - manual trigger, or
# - scheduled once in a while to validate assumptions

name: "Benchmark - E2E Playwright Sharding (node-ui-example)"

on:
  workflow_dispatch: {}
  # or schedule:
  schedule:
    - cron: "0 3 * * 0"  # Sundays at 03:00 UTC

jobs:
  baseline:
    name: "Baseline E2E (workers=1)"
    uses: BrikByte-Studios/.github/.github/workflows/e2e-playwright.yml@main
    with:
      target_url: "http://localhost:3000"
      enable_firefox: false
      enable_webkit: false
      workers: "1"
      retries: 0
      trace_mode: "off"
      service_workdir: "node-ui-example"
      artifact_suffix: "-baseline"  

  sharded:
    name: "Sharded E2E (workers=50%)"
    uses: BrikByte-Studios/.github/.github/workflows/e2e-playwright.yml@main
    with:
      target_url: "http://localhost:3000"
      enable_firefox: false
      enable_webkit: false
      workers: "50%"
      retries: 0
      trace_mode: "off"
      service_workdir: "node-ui-example"
      artifact_suffix: "-sharded" 

  compare:
    name: "Compare baseline vs sharded duration"
    runs-on: ubuntu-latest
    needs: [baseline, sharded]

    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4

      # Download the E2E audit slices produced by the reusable workflow
      - name: "Download baseline E2E audit slice"
        uses: actions/download-artifact@v4
        with:
          # Must match upload name from reusable workflow:
          # e2e-audit-<service_workdir>-<browser>-workers-<workers><artifact_suffix>
          name: "e2e-audit-node-ui-example-chromium-workers-1-baseline"
          path: "audit-baseline"

      - name: "Download sharded E2E audit slice"
        uses: actions/download-artifact@v4
        with:
          name: "e2e-audit-node-ui-example-chromium-workers-50%-sharded"
          path: "audit-sharded"

      - name: "Compute sharding impact"
        run: |
            set -euo pipefail

            BASELINE_META=$(find audit-baseline -name "metadata.json" | head -n1)
            SHARDED_META=$(find audit-sharded -name "metadata.json" | head -n1)

            echo "Baseline metadata: ${BASELINE_META}"
            echo "Sharded metadata: ${SHARDED_META}"

            python .github/scripts/compute_sharding.py "${BASELINE_META}" "${SHARDED_META}"




