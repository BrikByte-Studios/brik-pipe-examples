# BrikByteOS — Container Matrix Self-Test (PIPE-CONTAINER-TEST-STACKS-TEST-006)
#
# Purpose:
#   - End-to-end validation for ALL supported stacks:
#       Node, Python, Java, .NET, Go.
#   - Flow per stack:
#       1) Build & push via reusable Kaniko workflow (ci-build-kaniko.yml).
#       2) Run container on a CI runner using docker.
#       3) Hit /health (or equivalent) and assert HTTP 200.
#   - Emits:
#       - Matrix PASS/FAIL per runtime in CI logs.
#       - Small JSON artifact per runtime (for .audit usage).
#
# This workflow lives in:
#   Repo: BrikByte-Studios/brik-pipe-examples
#   Path: .github/workflows/ci-container-matrix-selftest.yml
#
# It depends on:
#   Repo: BrikByte-Studios/.github
#   File: .github/workflows/ci-build-kaniko.yml
#   (Kaniko reusable build workflow, with registry auth + caching + tag policy.)

name: "CI — Container Matrix Self-Test (All Stacks)"

on:
  # Run nightly to continuously validate all stacks.
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily

  # Also run when core templates / workflows / runtime docs change.
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/ci-container-matrix-selftest.yml"
      - ".github/workflows/node-api-use-kaniko.yml"
      - ".github/workflows/python-api-use-kaniko.yml"
      - ".github/workflows/java-api-use-kaniko.yml"
      - ".github/workflows/dotnet-api-use-kaniko.yml"
      - ".github/workflows/go-api-use-kaniko.yml"
      - ".github/templates/Dockerfile.*"
      - "brik-pipe-docs/runtime-matrix.md"

permissions:
  contents: read
  packages: write   # required for GHCR push/pull
  id-token: write   # future-proof for cosign / OIDC if needed

env:
  # Self-test "pseudo-version" — valid SemVer with pre-release tag.
  # This satisfies GOV-IMAGES-TAG-POLICY-CONFIG-001 (SHA + SemVer).
  MATRIX_SEMVER_TAG: "v0.0.0-selftest"

# ======================================================================
# 1) BUILD & PUSH (Kaniko via reusable workflow)
# ======================================================================
jobs:
  build-and-push:
    name: "Build & Push via Kaniko (Matrix)"

    strategy:
      fail-fast: false
      matrix:
        # Matrix of supported runtimes + per-stack config.
        include:
          - runtime: node
            service_key: node-api
            context: node-api-example
            dockerfile: node-api-example/Dockerfile
            port: 3000
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-node-api-selftest

          - runtime: python
            service_key: python-api
            context: python-api-example
            dockerfile: python-api-example/Dockerfile
            port: 8000
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-python-api-selftest

          - runtime: java
            service_key: java-api
            context: java-api-example
            dockerfile: java-api-example/Dockerfile
            port: 8080
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-java-api-selftest

          - runtime: dotnet
            service_key: dotnet-api
            context: dotnet-api-example
            dockerfile: dotnet-api-example/Dockerfile
            port: 8080
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-dotnet-api-selftest

          - runtime: go
            service_key: go-api
            context: go-api-example
            dockerfile: go-api-example/Dockerfile
            port: 8080
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-go-api-selftest

    # Each matrix entry calls the reusable Kaniko workflow defined in:
    #   Repo: BrikByte-Studios/.github
    #   Path: .github/workflows/ci-build-kaniko.yml
    uses: BrikByte-Studios/.github/.github/workflows/ci-build-kaniko.yml@main

    with:
      # Base image name per runtime (no tag).
      image_name: ${{ matrix.image_name }}

      # Context and Dockerfile inside brik-pipe-examples repo.
      context: ./${{ matrix.context }}
      dockerfile: ./${{ matrix.dockerfile }}

      # Tags MUST satisfy GOV-IMAGES-TAG-POLICY-CONFIG-001:
      #   - One SemVer-style tag
      #   - One SHA-based tag
      tags: |
        ${{ env.MATRIX_SEMVER_TAG }}
        sha-${{ github.sha }}

      # Registry + cache wiring (GHCR + per-image cache).
      registry: ghcr.io
      cache_enabled: true
      cache_repo: ${{ matrix.image_name }}-cache

      # Example build args — tweak per runtime if needed.
      build_args: |
        RUNTIME=${{ matrix.runtime }}
        SERVICE_KEY=${{ matrix.service_key }}

    secrets:
      # For GHCR, GITHUB_TOKEN with packages:write is usually enough.
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}

  # ====================================================================
  # 2) SMOKE TEST — Run container + hit /health per runtime
  # ====================================================================
  smoke-test:
    name: "Container Smoke Tests (Matrix)"
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node
            service_key: node-api
            port: 3000
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-node-api-selftest

          - runtime: python
            service_key: python-api
            port: 8000
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-python-api-selftest

          - runtime: java
            service_key: java-api
            port: 8080
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-java-api-selftest

          - runtime: dotnet
            service_key: dotnet-api
            port: 8080
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-dotnet-api-selftest

          - runtime: go
            service_key: go-api
            port: 8080
            health_path: /health
            image_name: ghcr.io/brikbyte-studios/example-go-api-selftest

    env:
      MATRIX_SEMVER_TAG: v0.0.0-selftest

    steps:
      # ---------------------------------------------------------------
      # 1) Log in to GHCR so we can pull the images we just built
      # ---------------------------------------------------------------
      - name: "Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # 2) Pull and start the container
      #
      #    - Uses the SHA tag for uniqueness.
      #    - Binds container port -> localhost:<port>.
      # ---------------------------------------------------------------
      - name: "Pull & run container for ${{ matrix.runtime }}"
        id: run-container
        env:
          IMAGE_NAME: ${{ matrix.image_name }}
          RUNTIME: ${{ matrix.runtime }}
          CONTAINER_PORT: ${{ matrix.port }}
        run: |
          set -euo pipefail

          TAG="sha-${GITHUB_SHA}"
          IMAGE="${IMAGE_NAME}:${TAG}"

          echo "Runtime: ${RUNTIME}"
          echo "Image:   ${IMAGE}"

          echo "Pulling image..."
          docker pull "${IMAGE}"

          echo "Starting container..."
          CID=$(docker run -d -p 127.0.0.1:${CONTAINER_PORT}:${CONTAINER_PORT} "${IMAGE}")
          echo "Container ID: ${CID}"

          # Export CID for later cleanup step.
          echo "CID=${CID}" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------
      # 3) Wait for readiness + health check
      #
      #    - Polls http://localhost:<port>/health (or configured path)
      #      up to ~60s total.
      #    - Fails if not healthy in time.
      # ---------------------------------------------------------------
      - name: "Health check for ${{ matrix.runtime }}"
        env:
          CONTAINER_PORT: ${{ matrix.port }}
          HEALTH_PATH: ${{ matrix.health_path }}
        run: |
          set -euo pipefail

          url="http://127.0.0.1:${CONTAINER_PORT}${HEALTH_PATH}"
          echo "Probing health endpoint: ${url}"

          for i in {1..30}; do
            if curl -fsS "${url}" > /tmp/health-body; then
              echo "✅ Health check passed on attempt ${i}"
              echo "------ Response body ------"
              cat /tmp/health-body
              echo "---------------------------"
              exit 0
            fi

            echo "Still not ready (attempt ${i}) — sleeping 2s..."
            sleep 2
          done

          echo "❌ ERROR: Service did not become ready within timeout."
          echo "Last response (if any):"
          cat /tmp/health-body || true
          exit 1

      # ---------------------------------------------------------------
      # 4) Stop & clean up the container (always)
      # ---------------------------------------------------------------
      - name: "Stop container"
        if: always()
        run: |
          set -euo pipefail

          if [ -n "${CID:-}" ]; then
            echo "Stopping container ${CID}..."
            docker rm -f "${CID}" || true
          else
            echo "No CID exported, nothing to stop."
          fi

      # ---------------------------------------------------------------
      # 5) Emit per-runtime JSON for .audit usage
      #
      #    - out/container-matrix-<runtime>.json
      #    - Contains runtime, image, tag, status, reason.
      # ---------------------------------------------------------------
      - name: "Write per-runtime matrix JSON (audit)"
        if: always()
        env:
          IMAGE_NAME: ${{ matrix.image_name }}
          RUNTIME: ${{ matrix.runtime }}
        run: |
          set -euo pipefail

          mkdir -p out

          status="pass"
          reason=""
          if [ "${{ job.status }}" != "success" ]; then
            status="fail"
            reason="Health or runtime failure — see CI logs for ${RUNTIME}."
          fi

          cat > "out/container-matrix-${RUNTIME}.json" <<EOF
          {
            "runtime": "${RUNTIME}",
            "image": "${IMAGE_NAME}",
            "tag": "sha-${GITHUB_SHA}",
            "status": "${status}",
            "reason": "${reason}"
          }
          EOF

          echo "Wrote out/container-matrix-${RUNTIME}.json:"
          cat "out/container-matrix-${RUNTIME}.json"

      # ---------------------------------------------------------------
      # 6) Upload per-runtime JSON as CI artifact
      #
      #    - Future governance / docs repo can aggregate these into:
      #        .audit/YYYY-MM-DD/container-matrix.json
      # ---------------------------------------------------------------
      - name: "Upload matrix JSON artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-matrix-${{ matrix.runtime }}
          path: out/container-matrix-${{ matrix.runtime }}.json

      # ---------------------------------------------------------------
      # 7) End-of-job human-readable summary for this runtime
      # ---------------------------------------------------------------
      - name: "Runtime summary (job-level)"
        if: always()
        env:
          RUNTIME: ${{ matrix.runtime }}
        run: |
          echo "==================================================="
          echo "Runtime: ${RUNTIME}"
          echo "Job status: ${{ job.status }}"
          echo "==================================================="
