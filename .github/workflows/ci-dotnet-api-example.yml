name: "CI — .NET API Example"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1) Validate brikpipe.build.yml
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "dotnet-api-example"
      config-file: "brikpipe.build.yml"
      # schema-file left as default: ".github/schemas/brikpipe-build.schema.json"

  # 2) Only run .NET CI if config is valid.
  dotnet-ci:
    name: ".NET: Build & CI"
    needs: config-validate
    uses: BrikByte-Studios/.github/.github/workflows/template-dotnet-ci.yml@main
    with:
      dotnet-version: "8.0.x"
      project-path: "dotnet-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) .NET Tests + Coverage
  tests:
    name: ".NET: Unit Tests + Coverage"
    needs: dotnet-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-dotnet.yml@main
    with:
      dotnet-version: "8.0.x"
      working-directory: "dotnet-api-example"
      parallel_mode: "static"
      flaky_detect: "true"

  merge:
    name: ".NET: Merge coverage + junit (unit)"
    needs: tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-dotnet-shard*
          merge-multiple: true
          path: merged

      - name: Combine coverage.json (pick best or average)
        run: |
          set -euo pipefail
          echo "[MERGE] Listing merged artifacts:"
          find merged -maxdepth 12 -type f -print || true

          python - << 'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          # Accept both formats:
          # - */out/coverage.json (preferred)
          # - */coverage.json (fallback)
          candidates = []
          for p in Path("merged").rglob("coverage.json"):
              candidates.append(p)

          if not candidates:
              raise SystemExit("[MERGE] ERROR: No coverage.json found under merged/")

          best = None
          seen = 0

          def get_line_pct(d):
              try:
                  return float(((d.get("summary") or {}).get("line", 0.0)))
              except Exception:
                  return 0.0

          for p in sorted(candidates):
              try:
                  d = json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  continue

              v = get_line_pct(d)
              seen += 1
              print(f"[MERGE] candidate: {p} summary.line={v}")

              if best is None or v > best["v"]:
                  best = {"v": v, "d": d, "path": str(p)}

          if best is None:
              raise SystemExit("[MERGE] ERROR: coverage.json files exist but none were valid JSON")

          out = Path("out")
          out.mkdir(parents=True, exist_ok=True)

          merged = best["d"]
          merged.setdefault("meta", {})
          merged["meta"]["merge_strategy"] = "max_summary_line"
          merged["meta"]["selected_file"] = best["path"]
          merged["meta"]["candidates_seen"] = seen
          merged["generated_at"] = datetime.now(timezone.utc).isoformat().replace("+00:00","Z")

          (out / "coverage.json").write_text(json.dumps(merged, indent=2), encoding="utf-8")
          print("[MERGE] Selected:", best["path"])
          print("[MERGE] Merged coverage.summary.line =", best["v"])
          PY

          echo "[MERGE] Final out/coverage.json:"
          cat out/coverage.json | head -n 120

      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dotnet
          path: out/coverage.json

  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: merge
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      # Gate runs from the .NET project folder
      working-directory: "dotnet-api-example"

      # coverage.json is relative to working-directory
      coverage-file: "./out/coverage.json"

      # Policy + baseline live at repo root → step one level up
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"

      # Must match artifact name from test-dotnet.yml
      coverage-artifact-name: "coverage-dotnet"

  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: merge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download coverage + JUnit artifacts into project folder
      - name: Download coverage + JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-dotnet
          path: dotnet-api-example

      # Export audit bundle.
      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: dotnet-api-example
          junit: out/junit.xml
          coverage: out/coverage.json
          audit-root: .audit
          runtime: dotnet@8
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-dotnet"
          upload-to-blob: "true"             # set "true" once blob sync exists
          blob-target: "s3://brikbyte-audit/unit-tests/dotnet-api-example"
