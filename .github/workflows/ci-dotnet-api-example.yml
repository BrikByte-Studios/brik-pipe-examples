name: "CI — .NET API Example"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1) Validate brikpipe.build.yml
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "dotnet-api-example"
      config-file: "brikpipe.build.yml"
      # schema-file left as default: ".github/schemas/brikpipe-build.schema.json"

  # 2) Only run .NET CI if config is valid.
  dotnet-ci:
    name: ".NET: Build & CI"
    needs: config-validate
    uses: BrikByte-Studios/.github/.github/workflows/template-dotnet-ci.yml@main
    with:
      dotnet-version: "8.0.x"
      project-path: "dotnet-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) .NET Tests + Coverage
  tests:
    name: ".NET: Unit Tests + Coverage"
    needs: dotnet-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-dotnet.yml@main
    with:
      dotnet-version: "8.0.x"
      working-directory: "dotnet-api-example"
      parallel_mode: "static"
      flaky_detect: "true"

  publish-flaky-report:
    name: "Publish Flaky Stability Report"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all flaky shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-audit-*
          path: .audit-merge
          merge-multiple: true

      - name: Download JUnit shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: .junit-merge
          merge-multiple: true

      - name: Download flaky evidence artifacts (per shard)
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-dotnet-shard*
          path: .flaky-evidence
          merge-multiple: true
      - name: Merge flaky evidence + JUnit into leaderboard
        run: |
          set -euo pipefail
          mkdir -p out/flaky

          python - << 'PY'
          import json
          from pathlib import Path
          from collections import defaultdict
          import xml.etree.ElementTree as ET

          evidence_root = Path(".flaky-evidence")
          junit_root = Path(".junit-merge")
          audit_root = Path(".audit-merge")

          def norm_suite(s: str) -> str:
              s = (s or "").strip().lower()
              if "unit" in s: return "unit"
              if "integration" in s: return "integration"
              if "e2e" in s: return "e2e"
              return s or "unknown"

          # -------------------------------------------------------
          # 1) Load totals from per-shard summary.normalized.json
          # -------------------------------------------------------
          totals = defaultdict(lambda: {"pass":0,"fail":0,"runs":0})
          for p in evidence_root.rglob("summary.normalized.json"):
              d = json.loads(p.read_text(encoding="utf-8"))
              suite = norm_suite(d.get("suite") or "unit")
              totals[suite]["pass"] += int(d.get("pass_count", 0))
              totals[suite]["fail"] += int(d.get("fail_count", 0))
              totals[suite]["runs"] += int(d.get("total_attempts", 0))

          if not totals:
              raise SystemExit("ERROR: No summary.normalized.json found. Download pattern should be flaky-python-shard* and shard jobs must upload out/flaky/.")

          # -------------------------------------------------------
          # 2) Parse JUnit for failing test names (per suite)
          # -------------------------------------------------------
          failed_tests_by_suite = defaultdict(set)
          junit_files = list(junit_root.rglob("junit.xml")) + list(junit_root.rglob("*.xml"))

          for jf in junit_files:
              try:
                  root = ET.parse(jf).getroot()
                  suites = root.findall("testsuite") if root.tag == "testsuites" else ([root] if root.tag == "testsuite" else [])
                  for ts in suites:
                      suite_name = norm_suite(ts.get("name") or ts.get("classname") or "unit")
                      for tc in ts.findall(".//testcase"):
                          classname = tc.get("classname") or ""
                          name = tc.get("name") or ""
                          full = f"{classname}::{name}" if classname else name
                          if tc.find("failure") is not None or tc.find("error") is not None:
                              if full:
                                  failed_tests_by_suite[suite_name].add(full)
              except Exception:
                  pass

          # -------------------------------------------------------
          # 3) Use audit ledger for metadata (optional)
          #    (If missing, we still produce correct totals.)
          # -------------------------------------------------------
          meta = {}
          for p in audit_root.rglob("metadata.json"):
              try:
                  meta = json.loads(p.read_text(encoding="utf-8"))
                  break
              except Exception:
                  pass

          # -------------------------------------------------------
          # 4) Build merged rows
          # -------------------------------------------------------
          rows = []
          for suite, v in totals.items():
              runs = v["runs"]
              fail = v["fail"]
              pas = v["pass"]
              rate = (fail / runs) if runs else 0.0

              # simple classification (you can replace with policy logic if you want)
              if fail == 0 and runs > 0:
                  classification = "pass"
              elif rate >= 0.7:
                  classification = "quarantine"
              elif rate >= 0.5:
                  classification = "flaky"
              else:
                  classification = "informational"

              failing_tests = sorted(failed_tests_by_suite.get(suite, []))

              if failing_tests:
                  for t in failing_tests:
                      rows.append({
                          "suite": suite,
                          "test_name": t,
                          "pass_count": pas,
                          "fail_count": fail,
                          "total_attempts": runs,
                          "fail_rate": round(rate, 4),
                          "classification": classification,
                          "run_id": meta.get("run_id"),
                          "repo": meta.get("repo"),
                      })
              else:
                  rows.append({
                      "suite": suite,
                      "test_name": None,
                      "pass_count": pas,
                      "fail_count": fail,
                      "total_attempts": runs,
                      "fail_rate": round(rate, 4),
                      "classification": classification,
                      "run_id": meta.get("run_id"),
                      "repo": meta.get("repo"),
                  })

          out = Path("out/flaky")
          out.mkdir(parents=True, exist_ok=True)
          (out / "flaky-merged.json").write_text(json.dumps(rows, indent=2), encoding="utf-8")

          md = []
          md.append("# Flaky Stability Report (Merged)")
          md.append("")
          md.append("| suite | test | classification | fail_rate | fail_count | pass_count | total_attempts |")
          md.append("|---|---|---:|---:|---:|---:|---:|")
          for x in sorted(rows, key=lambda r: (r["fail_rate"], r["fail_count"]), reverse=True)[:20]:
              md.append(f"| {x['suite']} | {x['test_name'] or '(suite-level)'} | {x['classification']} | {x['fail_rate']} | {x['fail_count']} | {x['pass_count']} | {x['total_attempts']} |")
          (out / "flaky-merged.md").write_text("\n".join(md), encoding="utf-8")

          print("✅ wrote out/flaky/flaky-merged.json and out/flaky/flaky-merged.md")
          PY

      - name: Upload flaky stability report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-stability-report
          path: out/flaky/
          retention-days: 30

  merge:
    name: ".NET: Merge coverage + junit (unit)"
    needs: tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-dotnet-shard*
          merge-multiple: true
          path: merged

      - name: Combine coverage.json (pick best or average)
        run: |
          set -euo pipefail
          echo "[MERGE] Listing merged artifacts:"
          find merged -maxdepth 12 -type f -print || true

          python - << 'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          # Accept both formats:
          # - */out/coverage.json (preferred)
          # - */coverage.json (fallback)
          candidates = []
          for p in Path("merged").rglob("coverage.json"):
              candidates.append(p)

          if not candidates:
              raise SystemExit("[MERGE] ERROR: No coverage.json found under merged/")

          best = None
          seen = 0

          def get_line_pct(d):
              try:
                  return float(((d.get("summary") or {}).get("line", 0.0)))
              except Exception:
                  return 0.0

          for p in sorted(candidates):
              try:
                  d = json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  continue

              v = get_line_pct(d)
              seen += 1
              print(f"[MERGE] candidate: {p} summary.line={v}")

              if best is None or v > best["v"]:
                  best = {"v": v, "d": d, "path": str(p)}

          if best is None:
              raise SystemExit("[MERGE] ERROR: coverage.json files exist but none were valid JSON")

          out = Path("out")
          out.mkdir(parents=True, exist_ok=True)

          merged = best["d"]
          merged.setdefault("meta", {})
          merged["meta"]["merge_strategy"] = "max_summary_line"
          merged["meta"]["selected_file"] = best["path"]
          merged["meta"]["candidates_seen"] = seen
          merged["generated_at"] = datetime.now(timezone.utc).isoformat().replace("+00:00","Z")

          (out / "coverage.json").write_text(json.dumps(merged, indent=2), encoding="utf-8")
          print("[MERGE] Selected:", best["path"])
          print("[MERGE] Merged coverage.summary.line =", best["v"])
          PY

          echo "[MERGE] Final out/coverage.json:"
          cat out/coverage.json | head -n 120

      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dotnet
          path: out/coverage.json

  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: merge
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      # Gate runs from the .NET project folder
      working-directory: "dotnet-api-example"

      # coverage.json is relative to working-directory
      coverage-file: "./out/coverage.json"

      # Policy + baseline live at repo root → step one level up
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"

      # Must match artifact name from test-dotnet.yml
      coverage-artifact-name: "coverage-dotnet"

  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: merge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download coverage + JUnit artifacts into project folder
      - name: Download coverage + JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-dotnet
          path: dotnet-api-example

      # Export audit bundle.
      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: dotnet-api-example
          junit: out/junit.xml
          coverage: out/coverage.json
          audit-root: .audit
          runtime: dotnet@8
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-dotnet"
          upload-to-blob: "true"             # set "true" once blob sync exists
          blob-target: "s3://brikbyte-audit/unit-tests/dotnet-api-example"
