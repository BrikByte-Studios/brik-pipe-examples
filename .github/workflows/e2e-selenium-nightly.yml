name: "Nightly • E2E (Selenium Grid • Cross-Browser)"

# -----------------------------------------------------------------------------
# Nightly • Selenium Grid (Cross-Browser)
#
# Purpose:
#   Run slower / flakier cross-browser Selenium checks on a schedule,
#   keeping PR gates fast (Playwright / Cypress).
#
# Strategy:
#   - Chrome + Firefox by default (governed matrix in reusable workflow)
#   - Optional Edge via workflow_dispatch input
#   - App + Grid started inside reusable workflow
#
# Triggers:
#   - schedule: nightly run (02:00 UTC)
#   - workflow_dispatch: manual run (debug / pre-release)
# -----------------------------------------------------------------------------

on:
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  selenium-nightly:
    name: "Nightly Selenium Grid"
    uses: BrikByte-Studios/.github/.github/workflows/e2e-selenium.yml@main
    with:
      # -----------------------------------------------------------------------
      # App under test
      #
      # NOTE:
      # - Browser nodes run in containers
      # - Use host.docker.internal for app access from Selenium nodes
      # -----------------------------------------------------------------------
      target_url: "http://host.docker.internal:3000"
      health_url: "http://localhost:3000/health"

      start_app: true
      app_service_workdir: "node-ui-example"
      app_compose_file: "docker-compose.e2e.yml"
      app_wait_seconds: 120

      # -----------------------------------------------------------------------
      # Selenium Grid (caller repo)
      # -----------------------------------------------------------------------
      service_workdir: "."
      compose_file: "docker-compose.selenium.yml"
      grid_wait_seconds: 120

      # -----------------------------------------------------------------------
      # Governed matrix wiring (NEW)
      #
      # Default (in reusable workflow):
      #   browsers = chrome,firefox
      #
      # Edge is conditionally added below.
      # -----------------------------------------------------------------------
      enable_edge: true

      # Selenium sharding intentionally OFF for nightly stability.
      # Increase only if your test runner implements deterministic splitting.
      override_shards: "1"

      # -----------------------------------------------------------------------
      # Test runner (Python)
      # -----------------------------------------------------------------------
      runner_language: "python"
      test_command: |
        set -euo pipefail
        cd python-selenium-runner-example
        python -m venv .venv
        . .venv/bin/activate
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pytest -q

      # -----------------------------------------------------------------------
      # Artifacts / audit
      # -----------------------------------------------------------------------
      artifact_name: "selenium-nightly"
      e2e_video: false
      e2e_trace: false
      e2e_artifacts_always: false

      # -----------------------------------------------------------------------
      # Safeguards
      # -----------------------------------------------------------------------
      job_timeout_minutes: 35
      enforce_teardown: true
