name: "UI E2E (Cypress)"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cypress-e2e:
    uses: BrikByte-Studios/.github/.github/workflows/e2e-cypress.yml@main
    with:
      # ----------------------------------------------------------
      # App under test
      # ----------------------------------------------------------
      target_url: "http://localhost:3000"
      health_path: "/health"
      service_workdir: "node-ui-example"

      # ----------------------------------------------------------
      # Docker-based app startup (optional)
      # ----------------------------------------------------------
      start_with_docker: true
      docker_image_name: "node-ui-example-e2e"
      docker_port: 3000

      # ----------------------------------------------------------
      # Cypress execution tuning
      # ----------------------------------------------------------
      spec_pattern: ""                # optional (e.g. cypress/e2e/auth.cy.ts)
      run_mode_retries: 2
      open_mode_retries: 0
      non_blocking: false             # fail PR if Cypress fails

      # ----------------------------------------------------------
      # Browser matrix (handled internally)
      # ----------------------------------------------------------
      # chrome, firefox, edge

      # ----------------------------------------------------------
      # Artifact / audit controls
      # ----------------------------------------------------------
      artifact_name: "cypress-ui-e2e"
      e2e_video: false                # disable always-on video
      e2e_trace: false                # Cypress usually false
      e2e_artifacts_always: false     # only export on failure

      # ----------------------------------------------------------
      # Safety switches
      # ----------------------------------------------------------
      allow_disable: true
      disable_cypress_e2e: false
      job_timeout_minutes: 30
