# E2E – Cypress pipeline for node-ui-example (or any UI service in this repo).
#
# Responsibilities:
# - Trigger Cypress E2E on PRs and main pushes.
# - Delegate the actual test run to the reusable org-level workflow.
# - Provide target URL + health path + working directory.

name: "E2E - Cypress (node-ui-example)"

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "node-ui-example/**"
      - ".github/workflows/e2e-cypress-node-ui.yml"
  push:
    branches: [ main ]
    paths:
      - "node-ui-example/**"
      - ".github/workflows/e2e-cypress-node-ui.yml"

jobs:
  e2e-cypress:
    uses: BrikByte-Studios/.github/.github/workflows/e2e-cypress.yml@main
    with:
      target_url: "http://localhost:3000"
      health_path: "/health"               # or "/" if you don’t have /health yet
      service_workdir: "node-ui-example"
      cypress_image: "cypress/included:13.12.0"
      artifact_name: "cypress-artifacts-node-ui-example"
      start_with_docker: true              # <== important
      docker_image_name: "node-ui-example-app"