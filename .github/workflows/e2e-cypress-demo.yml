name: "examples: e2e-cypress"

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  e2e_cypress:
    name: "E2E (Cypress) - node-ui-example"
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/e2e-cypress.yml@main
    with:
      working_directory: node-ui-example

      base_url: http://localhost:3000

      enable_app_boot: true
      app_install_command: npm ci
      app_start_command: npm start
      app_ready_url: http://localhost:3000/login
      app_ready_timeout_seconds: 120

      node_version: "20.x"
      command: npx cypress run
      browser: chrome
      retries: 1

      screenshots_dir: cypress/screenshots
      videos_dir: cypress/videos
      report_dir: cypress/results

      evidence_dir: test-artifacts/e2e/raw
      raw_reports_dir: test-artifacts/e2e/test-results

      junit_source_path: out/junit-e2e.xml
      junit_dest_name: junit.xml

      normalized_results_out: test-artifacts/e2e/test-results.json

      diagnostics: full
      artifact_mode: always
      upload_artifacts: true
      artifact_retention_days: 7
      timeout_minutes: 20

      # Flaky detection — opt-in repeat-run
      flaky_detection_enabled: true
      repeat_runs: 5
      repeat_out_dir: "test-results/flaky/e2e"
      repeat_results_glob: "test-artifacts/e2e/test-results/**/*.xml"
      repeat_max_runs: 10
      repeat_max_wall_clock_minutes: 60