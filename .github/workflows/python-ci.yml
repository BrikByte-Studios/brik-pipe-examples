name: "Example: python ci (Build + unit test)"

on: [push, pull_request]

jobs:
  build:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/build.yml@main
    with:
      stack: "python"
      working_directory: "python-api-example"
      runtime_version: "3.12"
      package_manager: "pip"

      run_lint: true
      run_tests: true

      lint_command: "make lint"
      test_command: "make test"
      build_command: "make build"

      upload_artifacts: true
      artifact_paths: "dist/**,out/**,__pycache__/**"

      # Cache (PIPE-CORE-1.3)
      enable_cache: true
      poetry_cache_mode: "pip-only"

  unit-tests:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test.yml@main
    with:
      stack: "python"
      working_directory: "python-api-example"
      python_version: "3.12"
      dependency_manager: "pip"
      test_command: "make test"
      coverage_mode: "optional"
      enforcement_mode: "warn"

      # -----------------------------
      # Flaky repeat-run (PIPE-CORE-2.5.1) — Opt-in, guardrailed
      # -----------------------------
      flaky_detection_enabled: true
      repeat_runs: 5

      # IMPORTANT: point to where your junit XML(s) are produced.
      # If your pytest config writes to test-artifacts/test-results/junit.xml,
      # keep this. Otherwise change it to your real path.
      repeat_results_glob: "python-api-example/test-artifacts/test-results/**/*.xml"

      # Where repeat-run evidence is written (relative to workspace)
      repeat_out_dir: "python-api-example/test-results/flaky"

      # Guardrails
      repeat_max_runs: 10
      repeat_max_wall_clock_minutes: 30

      # Optional label
      repeat_suite_name: "unit"
