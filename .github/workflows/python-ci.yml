name: "Example: python ci (Build + unit test)."

on: [push, pull_request]
permissions:
  actions: read
  contents: read

jobs:
  build:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/build.yml@main
    with:
      stack: "python"
      working_directory: "python-api-example"
      runtime_version: "3.12"
      package_manager: "pip"

      run_lint: true
      run_tests: true

      lint_command: "make lint"
      test_command: "make test"
      build_command: "make build"

      upload_artifacts: true
      artifact_paths: "dist/**,out/**,__pycache__/**"

      # Cache (PIPE-CORE-1.3)
      enable_cache: true
      poetry_cache_mode: "pip-only"

  unit-tests:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/unit-test.yml@main
    with:
      stack: "python"
      working_directory: "python-api-example"
      python_version: "3.12"
      dependency_manager: "pip"
      test_command: "make test"
      coverage_mode: "optional"
      enforcement_mode: "warn"

      # -----------------------------
      # Flaky repeat-run (PIPE-CORE-2.5.1) — Opt-in, guardrailed
      # -----------------------------
      flaky_detection_enabled: true
      repeat_runs: 5

      # IMPORTANT: match where your JUnit is produced (per run).
      repeat_results_glob: "python-api-example/test-artifacts/test-results/**/*.xml"

      # Repeat-run evidence output (workspace-relative)
      repeat_out_dir: "python-api-example/test-results/flaky"

      # Guardrails
      repeat_max_runs: 10
      repeat_max_wall_clock_minutes: 30

      # Optional label
      repeat_suite_name: "unit"

      # -----------------------------
      # Flaky evaluator (PIPE-CORE-2.5.2)
      # -----------------------------

      # Where evaluator writes its artifacts (workspace-relative)
      flaky_eval_out_dir: "python-api-example/test-results/flaky/eval"

      # If empty, unit-test.yml should default to:
      #   ${repeat_out_dir}/repeat-manifest.json
      flaky_manifest_path: "python-api-example/test-results/flaky/repeat-manifest.json"

      # Threshold overrides (optional; policy.yml can define these too)
      flaky_stable_max_fail_rate: "0.05"
      flaky_flaky_max_fail_rate: "0.40"

      # Repo policy path (optional override; default should be .github/policy.yml)
      repo_policy_path: ".github/policy.yml"

  flaky-trends:
    name: "Flaky trends (main only)"
    if: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Flaky trends
        uses: BrikByte-Studios/brik-pipe-actions/.github/actions/flaky-trend-aggregator@main
        with:
          enabled: "true"
          windows: "7,30"
          top_n: "10"
          branch: "main"
          event_filter: "push"
          artifact_name_prefix: "flaky-summary-run-"
          max_runs_scan: "60"
          out_dir: "test-results/flaky/trends"
          stable_max_fail_rate: "0.05"
          flaky_max_fail_rate: "0.40"
          write_markdown: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload flaky trends outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "flaky-trends-${{ github.run_id }}"
          path: test-results/flaky/trends/**
          if-no-files-found: warn
          retention-days: 30

