name: "Python API — Focused Integration (Smoke)"

on:
  pull_request:
    branches: [ main ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/python-api-integration-focused.yml"
  push:
    branches: [ main ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/python-api-integration-focused.yml"

jobs:
  integration:
    name: "Python API — Focused Smoke Integration"
    uses: BrikByte-Studios/.github/.github/workflows/integration-test.yml@main
    secrets: inherit

    with:
      image: ghcr.io/brikbyte-studios/example-python-api:sha-${{ github.sha }}
      dockerfile: python-api-example/Dockerfile
      context: python-api-example

      db_image: postgres:16
      cache_image: redis:7
      enable_cache_service: false

      test_language: "python"
      test_command: "pytest tests/integration/smoke -q"

      healthcheck_path: "/health"
      healthcheck_timeout: "45"
      app_port: "8080"
      db_port: "5432"
