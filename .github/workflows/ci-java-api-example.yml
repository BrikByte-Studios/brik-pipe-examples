name: "CI — Java API Example"

on:
  push:
    branches: [main, master]
    paths:
      - "java-api-example/**"
      - ".github/workflows/ci-java-api-example.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "java-api-example/**"
      - ".github/workflows/ci-java-api-example.yml"

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"
  PROJECT_PATH: "java-api-example"
  COVERAGE_ARTIFACT: "coverage-java"

jobs:
  # --------------------------------------------------------------
  # 1) Validate brikpipe.build.yml
  # --------------------------------------------------------------
  config-validate:
    name: "Config: brikpipe.build.yml"
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: ${{ env.PROJECT_PATH }}
      config-file: "brikpipe.build.yml"
      # schema-file left as default: ".github/schemas/brikpipe-build.schema.json"

  # --------------------------------------------------------------
  # 2) Java CI (build / compile / lint etc.)
  # --------------------------------------------------------------
  java-ci:
    name: "Java: Build & CI"
    needs: config-validate
    uses: BrikByte-Studios/.github/.github/workflows/template-java-ci.yml@main
    with:
      java-version: ${{ env.JAVA_VERSION }}
      distribution: ${{ env.JAVA_DISTRIBUTION }}
      project-path: ${{ env.PROJECT_PATH }}
      enable-cache: "true"
      force-cache-refresh: "false"
    secrets: inherit

  # --------------------------------------------------------------
  # 3) Java Tests + Coverage
  #    (produces out/coverage.json + coverage-java artifact)
  # --------------------------------------------------------------
  tests:
    name: "Java: Unit Tests + Coverage"
    needs: java-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-java.yml@main
    with:
      java-version: ${{ env.JAVA_VERSION }}
      distribution: ${{ env.JAVA_DISTRIBUTION }}
      working-directory: ${{ env.PROJECT_PATH }}

  # --------------------------------------------------------------
  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  # --------------------------------------------------------------
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: tests
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      # Gate evaluates coverage from inside the Java example folder
      working-directory: ${{ env.PROJECT_PATH }}

      # coverage.json produced by test-java.yml:
      coverage-file: "./out/coverage.json"

      # Policy + baseline live at repo root, so we go one level up.
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"

      # Artifact name produced by test-java.yml
      coverage-artifact-name: ${{ env.COVERAGE_ARTIFACT }}

  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download coverage + JUnit artifacts (from test-java.yml)
      - name: Download coverage + JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.COVERAGE_ARTIFACT }}
          path: ${{ env.PROJECT_PATH }}

      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: ${{ env.PROJECT_PATH }}
          junit: "out/junit.xml"
          coverage: "out/coverage.json"
          audit-root: ".audit"
          runtime: "java@${{ env.JAVA_VERSION }}"
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-java"
          upload-to-blob: "true"
          blob-target: "s3://brikbyte-audit/unit-tests/java-api-example"
