name: "CI — Java API Example"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------
  # 1) Validate brikpipe.build.yml.
  # --------------------------------------------------------------
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "java-api-example"
      config-file: "brikpipe.build.yml"
      # schema-file left as default: ".github/schemas/brikpipe-build.schema.json".

  # --------------------------------------------------------------
  # 2) Java CI (build / compile / lint etc.)
  # --------------------------------------------------------------
  java-ci:
    name: "Java: Build & CI"
    needs: config-validate
    uses: BrikByte-Studios/.github/.github/workflows/template-java-ci.yml@main
    with:
      java-version: "17"
      distribution: "temurin"
      project-path: "java-api-example"
      enable-cache: "true"
      force-cache-refresh: "false"
    secrets: inherit

  # --------------------------------------------------------------
  # 3) Java Tests + Coverage (sharded inside test-java.yml)
  #    - uploads per-shard artifacts: coverage-java-shard<N>.
  # --------------------------------------------------------------
  tests:
    name: "Java: Unit Tests + Coverage"
    needs: java-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-java.yml@main
    with:
      java-version: "17"
      distribution: "temurin"
      working-directory: "java-api-example"
      # optional governed parallelism (clamped to caps):
      override_shards: "4"
      flaky_detect: "true"
      # matrix_config_path: ""   # leave empty to use default inside .github repo

  # --------------------------------------------------------------
  # 3.5) Merge shard coverage artifacts -> canonical java-api-example/out/coverage.json
  # --------------------------------------------------------------
  merge-coverage:
    name: "Merge coverage shards"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download all Java coverage shard artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-java-shard*"
          path: "java-api-example/.artifacts/coverage"
          merge-multiple: false

      - name: "Select canonical coverage.json"
        working-directory: "java-api-example"
        run: |
          set -euo pipefail
          mkdir -p out

          echo "[MERGE] Listing downloaded coverage artifacts:"
          find .artifacts/coverage -type f -maxdepth 6 -print || true

          # Find ALL shard coverage.json files
          mapfile -t files < <(find .artifacts/coverage -type f -path "*/out/coverage.json" -print)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "[MERGE] ERROR: No shard out/coverage.json found"
            exit 1
          fi

          best=""
          best_val="-1"

          for f in "${files[@]}"; do
            val="$(node -e 'const j=require(process.argv[1]); console.log(((j.summary||{}).line ?? -1))' "$f" 2>/dev/null || echo -1)"
            echo "[MERGE] candidate: $f line=$val"
            if node -e "process.exit(!(Number('$val') > Number('$best_val')))" ; then
              best_val="$val"
              best="$f"
            fi
          done

          echo "[MERGE] Selected: $best (line=$best_val)"
          cp "$best" out/coverage.json

          echo "[MERGE] Final java-api-example/out/coverage.json:"
          head -n 80 out/coverage.json || true

      - name: "Upload merged coverage artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-java-merged"
          path: |
            java-api-example/out/coverage.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

  # --------------------------------------------------------------
  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  # --------------------------------------------------------------
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: merge-coverage
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      working-directory: "java-api-example"
      coverage-file: "./out/coverage.json"

      # Policy + baseline live at repo root, so we go one level up
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"

      # Use merged artifact
      coverage-artifact-name: "coverage-java-merged"


  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*).
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: merge-coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "Download merged coverage artifact"
        uses: actions/download-artifact@v4
        with:
          name: "coverage-java-merged"
          path: "."

      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: java-api-example
          junit: out/junit.xml
          coverage: out/coverage.json
          audit-root: .audit
          runtime: java@17
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-java"
          upload-to-blob: "true"             # set "true" once blob sync exists
          blob-target: "s3://brikbyte-audit/unit-tests/java-api-example"
