name: "CI — Java API Example"

on:
  push:
    branches: [ main, master ]
    paths:
      - "java-api-example/**"
      - ".github/workflows/ci-java-api-example.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "java-api-example/**"
      - ".github/workflows/ci-java-api-example.yml"

jobs:
  # 1) Validate brikpipe.build.yml
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "java-api-example"
      config-file: "brikpipe.build.yml"
      # schema-file left as default: ".github/schemas/brikpipe-build.schema.json"

  # 2) Java CI (build / compile / lint etc.)
  java-ci:
    name: "Java: Build & CI"
    needs: config-validate
    uses: BrikByte-Studios/.github/.github/workflows/template-java-ci.yml@main
    with:
      java-version: "17"
      distribution: "temurin"
      project-path: "java-api-example"
      enable-cache: "true"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) Java Tests + Coverage (produces out/coverage.json + coverage-java artifact)
  tests:
    name: "Java: Unit Tests + Coverage"
    needs: java-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-java.yml@main
    with:
      java-version: "17"
      distribution: "temurin"
      working-directory: "java-api-example"

    # --------------------------------------------------------------
  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  # --------------------------------------------------------------
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: tests
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      # Gate evaluates coverage from inside the Java example folder
      working-directory: "java-api-example"

      # coverage.json produced by test-java.yml:
      coverage-file: "./out/coverage.json"

      # Policy + baseline live at repo root, so we go one level up.
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"

      # Artifact name produced by test-java.yml
      coverage-artifact-name: "coverage-java"
