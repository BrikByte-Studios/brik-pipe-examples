# =============================================================================
# BrikByteOS — Example Repo Release Workflow
#
# File: brik-pipe-examples/.github/workflows/release.yml
#
# Purpose:
# --------
# Demonstrates how downstream repositories consume the centralized
# BrikByteOS SemVer Tagging pipeline.
#
# This workflow delegates release tagging to:
#   brik-pipe-actions/.github/workflows/semver-tag.yml
#
# It serves as:
#   - Integration proof
#   - Reference implementation
#   - Training example
#   - Regression safety net
#
# Governance:
# -----------
# - All release logic is centralized
# - This repo contains NO custom tagging logic
# - Prevents policy drift
#
# Related:
# --------
# - PIPE-CORE-3.1.3
# - RTM-RELEASE-001
# - brik-pipe-actions.
#
# =============================================================================

name: Release (BrikByteOS Example)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "SemVer bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
      dry_run:
        description: "Dry run (no tag created)"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/semver-tag.yml@main
    with:
      bump: ${{ inputs.bump }}
      dry_run: ${{ inputs.dry_run }}
      audit_enabled: true
      create_github_release: false
