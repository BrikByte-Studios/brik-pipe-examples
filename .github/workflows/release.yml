# =============================================================================
# BrikByteOS — Example Repo Release Workflow
#
# File: brik-pipe-examples/.github/workflows/release.yml
#
# Purpose:
# --------
# - PRs: Release PR workflow (PIPE-CORE-3.2.4)
#        - resolves version from release/vX.Y.Z
#        - runs changelog builder in preview mode
#        - enforces PIPE-CHANGELOG check
#        - optional PR comment summary (safe, no forks)
# - Manual release: semver tag + changelog write (trusted branch only)
# - Manual release: build + publish release artifacts to GitHub Releases (PIPE-CORE-3.3.1)
#
# Governance:
# -----------
# - Release PR logic is centralized in brik-pipe-actions reusable workflows
# - This repo contains NO custom tagging/changelog logic.
# =============================================================================

name: Release (BrikByteOS Example)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      bump:
        description: "SemVer bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
      dry_run:
        description: "Dry run (no tag created)"
        required: true
        default: false
        type: boolean
      
      publish_s3:
        description: "Also publish artifacts to S3-compatible storage (MinIO/R2/etc.)"
        required: true
        default: false
        type: boolean

      s3_endpoint:
        description: "S3 endpoint (leave empty to use default AWS endpoint later)"
        required: false
        default: "http://localhost:9000"

      s3_bucket:
        description: "Target bucket name (MinIO test bucket or real bucket)"
        required: false
        default: "brikbyte-artifacts"

      s3_prefix:
        description: "Prefix for objects (base). Final path will append repo + tag."
        required: false
        default: "releases/"

# Default permissions: read-only (least privilege)
permissions:
  contents: read

jobs:
  # ------------------------------------------------------------
  # PR Release Gate (safe): call PIPE-CORE-3.2.4 orchestrator
  # ------------------------------------------------------------
  pr_release_gate:
    name: PIPE-CHANGELOG (Release PR)
    if: ${{ github.event_name == 'pull_request' }}
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/release-pr.yml@main
    permissions:
      contents: read
      pull-requests: write
    with:
      output_file: CHANGELOG.md
      enforcement_mode: warn
      include_merges: false
      audit_enabled: true
      comment_summary: true

  # ------------------------------------------------------------
  # Debug (optional)
  # ------------------------------------------------------------
  debug:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Debug policy presence
        run: |
          echo "SHA: $(git rev-parse HEAD)"
          ls -la .github || true
          test -f .github/policy.yml && echo "FOUND .github/policy.yml" || echo "MISSING .github/policy.yml"

  # ------------------------------------------------------------
  # Release (manual): semver tag workflow
  # Safety: only allow on main
  # ------------------------------------------------------------
  release:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/semver-tag.yml@main
    permissions:
      contents: write
    with:
      bump: ${{ inputs.bump }}
      dry_run: ${{ inputs.dry_run }}
      audit_enabled: true
      create_github_release: false
      policy_file: .github/policy.yml

  show_outputs:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: read
    steps:
      - run: |
          echo "new_version=${{ needs.release.outputs.new_version }}"
          echo "tag=${{ needs.release.outputs.tag }}"
          echo "sha=${{ needs.release.outputs.sha }}"
          echo "previous_version=${{ needs.release.outputs.previous_version }}"

  # ------------------------------------------------------------
  # Changelog write + artifact handoff (reliable)
  #
  # WHY:
  # - Jobs do not share workspace.
  # - Reusable workflow "write+commit" may not push / may not be visible in this run.
  # - So we generate CHANGELOG.md in THIS job and upload it as an artifact.
  #
  # NOTE:
  # - This does NOT require pushing back to main to publish release notes.
  # - If you still want to commit CHANGELOG.md to main, do it in a separate follow-up task.
  # ------------------------------------------------------------
  changelog_generate_and_upload:
    name: Generate CHANGELOG.md + upload artifact
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.dry_run == false }}
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog (write mode, no commit)
        id: cl
        uses: BrikByte-Studios/brik-pipe-actions/.github/actions/changelog-builder@main
        with:
          mode: "write"
          version: ${{ needs.release.outputs.new_version }}
          from_ref: ${{ needs.release.outputs.previous_version }}
          to_ref: ${{ needs.release.outputs.sha }}
          output_file: "CHANGELOG.md"
          enforcement_mode: "warn"
          include_merges: "false"
          audit_enabled: "true"
          audit_dir: ".audit"
          commit_changes: "false"

      - name: Ensure CHANGELOG exists
        shell: bash
        run: |
          set -euo pipefail
          test -f CHANGELOG.md || (echo "CHANGELOG.md missing after changelog generation" && exit 1)
          echo "CHANGELOG.md bytes=$(wc -c < CHANGELOG.md)"

      - name: Upload changelog file
        uses: actions/upload-artifact@v4
        with:
          name: changelog-md
          path: CHANGELOG.md
          if-no-files-found: error

      - name: Upload changelog audit bundle (optional)
        uses: actions/upload-artifact@v4
        with:
          name: changelog-audit
          path: .audit
          if-no-files-found: warn

  # ------------------------------------------------------------
  # Build Example Artifacts (example repo only)
  # Produces dist/release/* + placeholder SBOM + hashes
  # ------------------------------------------------------------
  build_release_artifacts:
    name: Build example release artifacts
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.dry_run == false }}
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create example artifact outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          echo "BrikByteOS Example artifact for ${{ needs.release.outputs.new_version }}" > dist/release/example.txt

      - name: Generate placeholder SBOM + SHA256
        shell: bash
        run: |
          set -euo pipefail
          echo '{ "bomFormat": "CycloneDX", "specVersion": "1.5", "metadata": { "component": { "name": "brik-pipe-examples", "version": "${{ needs.release.outputs.new_version }}" } } }' \
            > dist/release/sbom.cdx.json
          sha256sum dist/release/* > dist/release/integrity-hashes.sha256

      - name: Upload release artifacts for publishing job
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/release
          if-no-files-found: error

  # ------------------------------------------------------------
  # Publish Release Artifacts (GitHub Releases) — PIPE-CORE-3.3.1
  #
  # Safety: only on main + only when NOT dry_run
  # Uses artifact handoff:
  # - release-dist (dist/release/*)
  # - changelog-md (CHANGELOG.md)
  # ------------------------------------------------------------
  publish_artifacts:
    name: Publish artifacts (GitHub Release)
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.dry_run == false }}
    needs: [release, build_release_artifacts, changelog_generate_and_upload]
    uses: BrikByte-Studios/.github/.github/workflows/reusable-publish-artifacts.yml@main
    permissions:
      contents: write
    secrets:
      release_token: ${{ secrets.BRIKBYTE_RELEASE_TOKEN }}
    with:
      repository: ${{ github.repository }}
      tag: ${{ needs.release.outputs.tag }}

      artifacts_glob: "dist/release/*"
      attachments_glob: "dist/release/*.json,dist/release/*.sha256,dist/release/*.spdx.json,dist/release/*.cdx.json"

      overwrite_policy: "fail"
      draft: false
      prerelease: false

      body_path: "CHANGELOG.md"
      generate_release_notes: false

      audit_dir: ".audit"
      audit_namespace: "release/artifacts"
      require_attachments: true

      dist_artifact_name: "release-dist"
      changelog_artifact_name: "changelog-md"

  publish_artifacts_s3:
    name: Publish artifacts (S3-compatible)
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.dry_run == false && inputs.publish_s3 == true }}
    needs: [release, build_release_artifacts, changelog_generate_and_upload]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    services:
      minio:
        image: minio/minio:RELEASE.2024-12-18T09-31-35Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --name minio

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/release

      - uses: actions/download-artifact@v4
        with:
          name: changelog-md
          path: .

      - name: Wait for MinIO to be ready
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..40}; do
            if curl -fsS "http://localhost:9000/minio/health/ready" > /dev/null; then
              echo "MinIO is ready."
              exit 0
            fi
            echo "Waiting for MinIO... ($i/40)"
            sleep 2
          done
          exit 1

      - name: Create bucket (MinIO)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          ./mc alias set local "http://localhost:9000" minioadmin minioadmin
          ./mc mb --ignore-existing "local/${{ inputs.s3_bucket }}"
          ./mc ls "local/${{ inputs.s3_bucket }}"

      - name: Compute S3 prefix
        id: s3
        shell: bash
        run: |
          set -euo pipefail
          echo "prefix=releases/${GITHUB_REPOSITORY}/${{ needs.release.outputs.tag }}/" >> "$GITHUB_OUTPUT"

      - name: Publish to S3-compatible storage (PIPE-CORE-3.3.2)
        uses: BrikByte-Studios/brik-pipe-actions/.github/actions/publish-s3-artifacts@main
        with:
          endpoint: "http://localhost:9000"
          aws_region: "us-east-1"
          bucket: ${{ inputs.s3_bucket }}
          prefix: ${{ steps.s3.outputs.prefix }}
          repo: ${{ github.repository }}
          tag: ${{ needs.release.outputs.tag }}

          artifacts_glob: "dist/release/*"
          attachments_glob: "dist/release/*.json,dist/release/*.sha256,dist/release/*.spdx.json,dist/release/*.cdx.json"
          require_attachments: "true"

          access_key_id: "minioadmin"
          secret_access_key: "minioadmin"

          encryption: "none"     # MinIO SSE varies; enforce on AWS later
          overwrite_policy: "fail"
          concurrency: "4"
          max_attempts: "5"

          dry_run: "false"
          audit_dir: ".audit"
          audit_namespace: "release/s3-artifacts"
      - name: Upload S3 audit bundle
        uses: actions/upload-artifact@v4
        with:
          name: s3-audit
          path: .audit
          if-no-files-found: warn


