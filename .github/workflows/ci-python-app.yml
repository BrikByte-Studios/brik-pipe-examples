# BrikByteOS Pipelines — Python API Example (pip + cache)
#
# Repo:
#   BrikByte-Studios/brik-pipe-examples
#
# Service:
#   python-api-example/
#
# Purpose:
#   - Run CI for the FastAPI-based Python example.
#   - Use BrikByteOS Python cache composite (pip / Poetry / Pipenv aware).
#   - Install dependencies via pip (requirements.txt) for this project.
#
# Notes:
#   - This project is pip-based (no pyproject.toml), so we do NOT run Poetry here.
#   - If you want a dedicated Poetry example later, we can add python-poetry-example.

name: "CI — Python API Example (pip + cache)"

on:
  push:
    branches: [ main ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/ci-python-api-example.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/ci-python-api-example.yml"

env:
  # Python version used for CI + cache keying.
  PYTHON_VERSION: "3.11"

jobs:
  build-test:
    name: "Build & Test — python-api-example"
    runs-on: ubuntu-latest

    # All run steps happen inside the service folder.
    defaults:
      run:
        working-directory: python-api-example

    steps:
      # -------------------------------------------------------------------
      # 1) Checkout monorepo
      # -------------------------------------------------------------------
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # 2) Setup Python (actions/setup-python)
      #
      #    - Sets pythonLocation, etc.
      #    - We also export PYTHON_VERSION for cache keys.
      # -------------------------------------------------------------------
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Export PYTHON_VERSION for cache"
        run: echo "PYTHON_VERSION=${PYTHON_VERSION}" >> "$GITHUB_ENV"

      # -------------------------------------------------------------------
      # 3) Cache Python dependencies (pip / Poetry / Pipenv-aware)
      #
      #    - Uses BrikByteOS composite action:
      #        Repo: BrikByte-Studios/.github
      #        File: .github/actions/cache-python-deps/action.yml
      #    - This project has requirements.txt → tool = pip.
      #    - Cache path: ~/.cache/pip
      #    - Key includes: runner.os + PYTHON_VERSION + tool + lockfile hash.
      # -------------------------------------------------------------------
      - name: "Cache Python dependencies (pip / poetry / pipenv)"
        uses: BrikByte-Studios/.github/.github/actions/cache-python-deps@main
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # -------------------------------------------------------------------
      # 4) Install dependencies via pip
      #
      #    - This example uses requirements.txt (pip-based).
      #    - No pyproject.toml → Poetry is not used here.
      # -------------------------------------------------------------------
      - name: "Install dependencies (pip)"
        run: |
          set -euo pipefail
          if [ ! -f "requirements.txt" ]; then
            echo "ERROR: requirements.txt not found in python-api-example/"
            exit 1
          fi
          pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------------------------------------------------
      # 5) Run tests (if present)
      #
      #    - Adjust as needed (pytest, unittest, etc).
      # -------------------------------------------------------------------
      - name: "Run tests (if any)"
        run: |
          set -euo pipefail
          if [ -f "pytest.ini" ] || ls tests/test_*.py >/dev/null 2>&1; then
            pytest
          else
            echo "No explicit tests detected — skipping pytest."
          fi

      # -------------------------------------------------------------------
      # 6) Smoke run (optional) — import app to ensure it loads
      #
      #    - This is a very light sanity check that main.py imports.
      # -------------------------------------------------------------------
      - name: "Import app module (sanity check)"
        run: |
          set -euo pipefail
          python -c "import main; print('Imported main.app OK:', hasattr(main, 'app'))"
