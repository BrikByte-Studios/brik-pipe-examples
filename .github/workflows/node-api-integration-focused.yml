# Node API — Focused Integration (PR-safe, smoke-level)
# ----------------------------------------------------
# Purpose:
#   - Run fast, high-value integration checks on:
#       * PRs to main touching node-api-example/**
#       * Direct pushes to main affecting node-api-example/**
#   - Allow emergency opt-out via "skip-integ-tests" label on PRs.
#   - Keep job under ~5 minutes by:
#       * small fixture set
#       * limited test scope (smoke / critical paths)
#
# NOTE:
#   - Full, exhaustive integration runs are handled by a separate
#     nightly workflow (see nightly-integration-suite.yml).

name: "Node API — Focused Integration (PR)"

on:
  pull_request:
    branches: [ main ]
    paths:
      - "node-api-example/**"
      - ".github/workflows/node-api-integration-focused.yml"
  push:
    branches: [ main ]
    paths:
      - "node-api-example/**"
      - ".github/workflows/node-api-integration-focused.yml"

jobs:
  integration:
    name: "Node API — Focused Containerized Integration Tests"

    # Contingency: allow emergency opt-out via PR label.
    # If the PR has label "skip-integ-tests", this job is skipped.
    if: >
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-integ-tests')

    uses: BrikByte-Studios/.github/.github/workflows/integration-test.yml@main
    secrets: inherit

    with:
      image: ghcr.io/brikbyte-studios/example-node-api:sha-${{ github.sha }}
      dockerfile: node-api-example/Dockerfile
      context: node-api-example

      # Infra
      db_image: postgres:16
      cache_image: redis:7
      enable_cache_service: true

      # Language & test scope.
      test_language: "node"

      # FOCUSED/SCOPE: only smoke / critical integration tests
      # e.g. test:integration:smoke (you wire this in package.json)
      # Falls back to integration runner defaults if left blank.
      test_command: "npm run test:integration:smoke"

      # Health checks (explicit, logged) - mitigation 1
      healthcheck_path: "/health"
      healthcheck_timeout: "60"

      app_port: "3000"
      db_port: "5432"
