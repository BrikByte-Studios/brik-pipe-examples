# BrikByteOS Pipelines — Node API Kaniko Example (Registry + Cache)
#
# This workflow:
#   - Runs on pushes to main that touch node-api-example.
#   - Builds a Node API image using the reusable Kaniko workflow.
#   - Tags it with:
#       - v0.1.0 (semver-like)
#       - sha-<GITHUB_SHA>
#   - Pushes to GHCR (ghcr.io/brikbyte-studios/example-node-api).
#   - Enables Kaniko caching using a derived cache repo:
#       ghcr.io/brikbyte-studios/example-node-api-cache
#
# Repo structure:
#   brik-pipe-examples/
#     .github/workflows/node-api-use-kaniko.yml   (this file)
#     node-api-example/
#       Dockerfile
#       ...

name: "CI — Build & Push (Node, Kaniko Example)"

on:
  push:
    branches: [ main ]
    paths:
      - "node-api-example/**"
      - ".github/workflows/node-api-use-kaniko.yml"

env:
  APP_VERSION: 0.1.0

jobs:
  build-and-push:
    # Calls the reusable workflow in BrikByte-Studios/.github
    uses: BrikByte-Studios/.github/.github/workflows/ci-build-kaniko.yml@main

    with:
      # Full image name hosted on GHCR
      image_name: ghcr.io/brikbyte-studios/example-node-api

      # Path to Dockerfile inside this monorepo
      dockerfile: ./node-api-example/Dockerfile

      # Build context for the app
      context: ./node-api-example

      # Two tags:
      #   - semver-like (hard-coded here as v0.1.0 for the example)
      #   - SHA-based
      tags: |
        v${{ env.APP_VERSION }}
        sha-${{ github.sha }}

      # Optional build arguments for the Docker build
      build_args: |
        NODE_ENV=production
        APP_NAME=example-node-api

      # Registry host; defaults to ghcr.io in the reusable workflow,
      # but we pass it for clarity.
      registry: ghcr.io

      # Enable caching (default is true, but we set explicitly for clarity)
      cache_enabled: true

      # Optional explicit cache repo (commented out):
      cache_repo: ghcr.io/brikbyte-studios/cache/example-node-api

    secrets:
      # Map repo/org secrets into the reusable workflow.
      #
      # For GHCR, this can often be the built-in GITHUB_TOKEN as long as
      # the repo has packages: write permission.
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optional – if you define REGISTRY_USERNAME at org/env level:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}