name: Node API - Container Build (Kaniko via BrikByteOS)

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*" # release builds
  pull_request:

jobs:
  container_kaniko:
    name: Kaniko build (BrikByteOS v1)
    uses: BrikByte-Studios/brik-pipe-actions/.github/workflows/container-build-kaniko.yml@main
    with:
      # Where the Dockerfile + app live (root = ".")
      working_directory: "node-api-example"
      context: "."
      dockerfile: "Dockerfile"

      # Canonical image name (no tag). Example uses GHCR.
      image_name: "ghcr.io/${{ github.repository_owner }}/node-api-example"

      # Tags: always include SHA tag; add SemVer tag on release
      # - For PRs / main pushes: sha-<shortsha>
      # - For tag pushes (vX.Y.Z): sha-<shortsha>,vX.Y.Z
      tags: >-
        sha-${{ github.sha }}

      push: ${{ github.event_name != 'pull_request' }}

      # Cache defaults for kaniko v1.
      cache_enabled: true
      cache_mode: "registry"
      cache_repo: "ghcr.io/${{ github.repository_owner }}/node-api-example-cache"

      # Build args / labels (optional).
      build_args: |
        NODE_ENV=production
      labels: |
        org.opencontainers.image.title=node-api-service
        org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        org.opencontainers.image.revision=${{ github.sha }}
        org.opencontainers.image.created=${{ github.run_id }}

      registry: "ghcr.io"
      auth_mode: "secrets" # v1 baseline for GHCR push

      # Evidence handling
      upload_artifacts: true
      validate_evidence_schema: true

      # --- PIPE-CORE-1.2.5 Tag Policy (v1) ---
      enforce_tag_policy: true
      allow_latest: false
      release: ${{ startsWith(github.ref, 'refs/tags/v') }}

    secrets:
      # Only required when push=true and auth_mode=secrets
      registry_username: ${{ github.actor }}
      registry_password: ${{ secrets.GITHUB_TOKEN }}
