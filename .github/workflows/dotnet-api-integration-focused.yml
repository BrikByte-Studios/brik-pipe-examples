name: ".NET API — Focused Integration (Smoke)"

on:
  pull_request:
    branches: [ main ]
    paths:
      - "dotnet-api-example/**"
      - ".github/workflows/dotnet-api-integration-focused.yml"
  push:
    branches: [ main ]
    paths:
      - "dotnet-api-example/**"
      - ".github/workflows/dotnet-api-integration-focused.yml"

jobs:
  integration:
    name: ".NET API — Focused Smoke Integration"
    uses: BrikByte-Studios/.github/.github/workflows/integration-test.yml@main
    secrets: inherit

    with:
      image: ghcr.io/brikbyte-studios/example-dotnet-api:sha-${{ github.sha }}
      dockerfile: dotnet-api-example/Dockerfile
      context: dotnet-api-example

      db_image: postgres:16
      enable_cache_service: false

      test_language: "dotnet"
      test_command: >
        dotnet test dotnet-api-example.sln
        --configuration Release
        --no-build
        --filter "Category=Integration&Category=Smoke"

      healthcheck_path: "/health"
      healthcheck_timeout: "60"
      app_port: "8080"
      db_port: "5432"
