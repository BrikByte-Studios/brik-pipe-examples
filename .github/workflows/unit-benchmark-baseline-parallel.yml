name: "brik: unit-benchmark-baseline (nightly)"

on:
  schedule:
    - cron: "0 1 * * *"  # 01:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline_serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # run serial tests here (one job, no matrix)
      - name: Run unit tests (serial)
        run: |
          cd node-api-example
          make test

      # NEW: normalize junit.xml -> test-results.json at workspace root
      - name: Normalize JUnit -> test-results.json (serial)
        shell: bash
        run: |
          set -euo pipefail

          JUNIT="node-api-example/test-artifacts/test-results/junit.xml"
          OUT="test-artifacts/unit/test-results.json"

          mkdir -p "$(dirname "$OUT")"

          if [ ! -f "$JUNIT" ]; then
            echo "::warning::No junit.xml found at $JUNIT; writing empty normalized results."
            cat > "$OUT" <<'EOF'
          {"schema_version":"test-results.json/v1","tool":"unit","summary":{"passed":0,"failed":0,"skipped":0,"total":0,"duration_ms":0},"warnings":["missing junit.xml"]}
          EOF
            exit 0
          fi

          python3 - <<'PY'
          import xml.etree.ElementTree as ET, json, os
          junit=os.environ["JUNIT"]; out=os.environ["OUT"]
          tree=ET.parse(junit); root=tree.getroot()
          suites=[root] if root.tag=="testsuite" else root.findall("testsuite")
          total=passed=failed=skipped=0; duration_s=0.0
          for s in suites:
            t=int(float(s.attrib.get("tests","0") or 0))
            f=int(float(s.attrib.get("failures","0") or 0))+int(float(s.attrib.get("errors","0") or 0))
            k=int(float(s.attrib.get("skipped","0") or 0))
            total+=t; failed+=f; skipped+=k; passed+=max(0,t-f-k)
            duration_s+=float(s.attrib.get("time","0") or 0)
          data={"schema_version":"test-results.json/v1","tool":"unit","summary":{
            "passed":passed,"failed":failed,"skipped":skipped,"total":total,"duration_ms":int(duration_s*1000)
          }}
          with open(out,"w",encoding="utf-8") as f: json.dump(data,f,indent=2)
          PY
        env:
          JUNIT: node-api-example/test-artifacts/test-results/junit.xml
          OUT: test-artifacts/unit/test-results.json

      - name: Benchmark (serial)
        uses: BrikByte-Studios/brik-pipe-actions/.github/actions/benchmark-parallelization@main
        with:
          test_type: unit
          stack: node
          mode: serial
          shards: 1
          normalized_results: test-artifacts/unit/test-results.json
          out: test-artifacts/unit/parallel/benchmarks/parallel-benchmark.json
          enforcement_mode: warn

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-benchmark-baseline
          path: test-artifacts/unit/parallel/benchmarks/parallel-benchmark.json
          retention-days: 14
