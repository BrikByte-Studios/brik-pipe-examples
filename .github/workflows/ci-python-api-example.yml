name: "CI — Python API Example"

on:
  push:
    branches: [ main, master ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/ci-python-api-example.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/ci-python-api-example.yml"

permissions:
  contents: read

jobs:
  # 1) Validate brikpipe.build.yml
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "python-api-example"
      config-file: "brikpipe.build.yml"

  # 2) Python CI (build, lint, install)
  python-ci:
    name: "Python: Build & Test"
    uses: BrikByte-Studios/.github/.github/workflows/template-python-ci.yml@main
    needs: config-validate
    with:
      python-version: "3.11"
      project-path: "python-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) Python tests + coverage (now sharded via matrix-plan inside test-python.yml)
  tests:
    name: "Python: Unit Tests + Coverage"
    needs: python-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-python.yml@main
    with:
      python-version: "3.11"
      working-directory: "python-api-example"
      # optional:
      override_shards: "4"
      # matrix_config_path: ".github/parallel-matrix.yml"

  # 3.5) Merge shard coverage artifacts into one canonical artifact
  #
  # Why: coverage-gate + audit-export should read ONE coverage.json.
  merge-coverage:
    name: "Merge coverage shards"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # Download ALL artifacts that start with `coverage-python-`
      - name: "Download all coverage shard artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-python-*"
          path: "python-api-example/.artifacts/coverage"
          merge-multiple: true

      # Pick one canonical out/coverage.json as the merged output.
      # (v1: last writer wins; still deterministic if you always pick shard1.)
      # Better: update your coverage-merge action to truly aggregate per-shard.
      - name: "Select canonical coverage.json"
        working-directory: "python-api-example"
        run: |
          set -euo pipefail
          mkdir -p out

          # We expect coverage artifacts to contain out/coverage.json (optionally per shard)
          if compgen -G ".artifacts/coverage/**/out/coverage.json" > /dev/null; then
            # Prefer shard1 if present, else first match.
            shard1="$(find .artifacts/coverage -path "*/shard1*/out/coverage.json" -print -quit 2>/dev/null || true)"

            if [[ -n "${shard1}" ]]; then
              echo "[MERGE] Using shard1 coverage: ${shard1}"
              cp "${shard1}" out/coverage.json
            else
              first="$(find .artifacts/coverage -path "*/out/coverage.json" -print -quit)"
              echo "[MERGE] Using first coverage: ${first}"
              cp "${first}" out/coverage.json
            fi
          else
            echo "[MERGE] ERROR: No out/coverage.json found under .artifacts/coverage"
            find .artifacts/coverage -maxdepth 6 -type f || true
            exit 1
          fi

          echo "[MERGE] Final out/coverage.json:"
          cat out/coverage.json


      - name: "Upload merged coverage artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-python-merged"
          path: |
            python-api-example/out/coverage.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: merge-coverage
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      working-directory: "python-api-example"
      coverage-file: "./out/coverage.json"

      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"

      # Updated to merged artifact name
      coverage-artifact-name: "coverage-python-merged"

  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: merge-coverage
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # Download merged coverage artifact into project folder
      - name: "Download merged coverage artifact"
        uses: actions/download-artifact@v4
        with:
          name: "coverage-python-merged"
          path: "python-api-example/out"

      - name: "Export unit test audit bundle"
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: "python-api-example"
          junit: "out/junit.xml"              # ensure your Makefile/pytest writes this
          coverage: "out/coverage.json"
          audit-root: ".audit"
          runtime: "python@3.11"
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-python"
          upload-to-blob: "true"             # set "true" once blob sync exists
          blob-target: "s3://brikbyte-audit/unit-tests/python-api-example"
