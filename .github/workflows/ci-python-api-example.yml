name: "CI — Python API Example"

on:
  push:
    branches: [ main, master ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/ci-python-api-example.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/ci-python-api-example.yml"

jobs:
  # 1) Validate brikpipe.build.yml (optional, same pattern as Node)
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "python-api-example"
      config-file: "brikpipe.build.yml"

  # --------------------------------------------------------------
  # 2) Python CI (build, lint, install)
  # --------------------------------------------------------------
  python-ci:
    name: "Python: Build & Test"
    uses: BrikByte-Studios/.github/.github/workflows/template-python-ci.yml@main
    needs: config-validate
    with:
      python-version: "3.11"
      project-path: "python-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) Python tests + coverage
  tests:
    name: "Python: Unit Tests + Coverage"
    needs: python-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-python.yml@main
    with:
      python-version: "3.11"
      working-directory: "python-api-example"

  # 4) Coverage Governance Gate (GOV-TEST-COVERAGE-POLICY-004)
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: tests
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      # Governance gate runs from repo root
      working-directory: "python-api-example"
      # coverage.json produced by test-python.yml:
      coverage-file: "./out/coverage.json"

      # point to policy above python-api-example/
      policy-file: "../.governance/tests.yml"

      # baseline also lives above python-api-example/
      baseline-file: "../.audit/coverage-baseline.json"

      # artifact name produced in test-python.yml
      coverage-artifact-name: "coverage-python"

  # --------------------------------------------------------------
  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  # --------------------------------------------------------------
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download coverage + JUnit (or equivalent) artifacts into repo root
      - name: Download coverage + JUnit artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-python
          path: python-api-example

      - name: Export unit test audit bundle
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: python-api-example
          junit: out/junit.xml
          coverage: out/coverage.json
          audit-root: .audit
          runtime: python@3.11
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-python"
          upload-to-blob: "true"             # set "true" once blob sync exists
          blob-target: "s3://brikbyte-audit/unit-tests/python-api-example"