name: "CI — Python API Example"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  # 1) Validate brikpipe.build.yml
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "python-api-example"
      config-file: "brikpipe.build.yml"

  # 2) Python CI (build, lint, install)
  python-ci:
    name: "Python: Build & Test"
    needs: [config-validate]
    uses: BrikByte-Studios/.github/.github/workflows/template-python-ci.yml@main
    with:
      python-version: "3.11"
      project-path: "python-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) Python tests + coverage (sharded inside test-python.yml)
  tests:
    name: "Python: Unit Tests + Coverage"
    needs: [python-ci]
    uses: BrikByte-Studios/.github/.github/workflows/test-python.yml@main
    with:
      python-version: "3.11"
      working-directory: "python-api-example"
      override_shards: "4"
      flaky_detect: "true"
    secrets: inherit

  publish-flaky-report:
    name: "Publish Flaky Stability Report"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all flaky shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-audit-*
          path: .audit-merge
          merge-multiple: true

      - name: Download JUnit shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: .junit-merge
          merge-multiple: true

      - name: Merge flaky audit ledger + JUnit into leaderboard
        run: |
          set -euo pipefail
          mkdir -p out/flaky

          python - << 'PY'
          import json, re
          from pathlib import Path
          from collections import defaultdict
          import xml.etree.ElementTree as ET

          audit_root = Path(".audit-merge")
          junit_root = Path(".junit-merge")

          # ---------------------------
          # 1) Load audit ledger rows
          # ---------------------------
          rows = []
          for p in audit_root.rglob("flaky-summary.json"):
            try:
              data = json.loads(p.read_text(encoding="utf-8"))
              if isinstance(data, list):
                rows.extend(data)
              elif isinstance(data, dict):
                rows.append(data)
            except Exception:
              pass

          # If nothing found, fail loudly (prevents silent "unknown-test" fallbacks)
          if not rows:
            raise SystemExit("ERROR: No flaky-summary.json found in .audit-merge (did you upload flaky-audit-* artifacts?)")

          # ---------------------------
          # 2) Parse JUnit to extract failing test names (per shard)
          # ---------------------------
          # We'll produce: suite -> set(test_names_that_failed)
          failed_tests_by_suite = defaultdict(set)

          def norm_suite(s: str) -> str:
            s = (s or "").strip().lower()
            if "unit" in s: return "unit"
            if "integration" in s: return "integration"
            if "e2e" in s: return "e2e"
            return s or "unknown"

          # Try read all junit.xml files
          junit_files = list(junit_root.rglob("junit.xml")) + list(junit_root.rglob("*.xml"))
          for jf in junit_files:
            try:
              tree = ET.parse(jf)
              root = tree.getroot()

              # JUnit can be <testsuites> or <testsuite>
              suites = []
              if root.tag == "testsuites":
                suites = root.findall("testsuite")
              elif root.tag == "testsuite":
                suites = [root]

              for ts in suites:
                suite_name = norm_suite(ts.get("name") or ts.get("classname") or "unit")
                for tc in ts.findall(".//testcase"):
                  classname = tc.get("classname") or ""
                  name = tc.get("name") or ""
                  full = f"{classname}::{name}" if classname else name

                  # consider failure/error nodes
                  if tc.find("failure") is not None or tc.find("error") is not None:
                    if full:
                      failed_tests_by_suite[suite_name].add(full)
            except Exception:
              continue

          # ---------------------------
          # 3) Expand audit summary rows into per-test rows when failures exist
          # ---------------------------
          expanded = []
          for r in rows:
            suite = norm_suite(r.get("suite"))
            classification = r.get("classification") or "unknown"
            fail_rate = float(r.get("fail_rate") or 0)

            # If suite is flaky/failing, attach failing test names if available
            failing_tests = sorted(failed_tests_by_suite.get(suite, []))
            if failing_tests:
              for t in failing_tests:
                rr = dict(r)
                rr["test_name"] = t
                expanded.append(rr)
            else:
              # keep suite-level row as-is (but avoid "unknown-test" lies)
              rr = dict(r)
              if rr.get("test_name") in (None, "", "unknown-test"):
                rr["test_name"] = None
              expanded.append(rr)

          # ---------------------------
          # 4) Output
          # ---------------------------
          out = Path("out/flaky")
          out.mkdir(parents=True, exist_ok=True)

          (out / "flaky-merged.json").write_text(json.dumps(expanded, indent=2), encoding="utf-8")

          # Simple markdown leaderboard
          # show top by fail_rate then fail_count
          def sort_key(x):
            return (float(x.get("fail_rate") or 0), int(x.get("fail_count") or 0))

          top = sorted(expanded, key=sort_key, reverse=True)[:20]

          md = []
          md.append("# Flaky Stability Report (Merged)")
          md.append("")
          md.append("| suite | test | classification | fail_rate | fail_count | pass_count | total_attempts |")
          md.append("|---|---|---:|---:|---:|---:|---:|")
          for x in top:
            md.append("| {suite} | {test} | {cls} | {rate} | {fail} | {pas} | {tot} |".format(
              suite=x.get("suite",""),
              test=x.get("test_name") or "(suite-level)",
              cls=x.get("classification",""),
              rate=x.get("fail_rate",0),
              fail=x.get("fail_count",0),
              pas=x.get("pass_count",0),
              tot=x.get("total", x.get("total_attempts",0)),
            ))
          (out / "flaky-merged.md").write_text("\n".join(md), encoding="utf-8")

          print("Wrote:", out / "flaky-merged.json")
          print("Wrote:", out / "flaky-merged.md")
          PY

      - name: Upload flaky stability report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-stability-report
          path: out/flaky/
          retention-days: 30


  # 3.5) Merge shard coverage artifacts into one canonical output (v1: pick one)
  merge-coverage:
    name: "Merge coverage shards"
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download all coverage shard artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-python-*"
          path: "python-api-example/.artifacts/coverage"
          merge-multiple: true

      - name: "Select canonical coverage (supports out/coverage.json OR coverage.json)"
        working-directory: "python-api-example"
        run: |
          set -euo pipefail
          mkdir -p out

          echo "[MERGE] Listing downloaded coverage artifacts:"
          find .artifacts/coverage -maxdepth 12 -type f -print || true

          mapfile -t candidates < <(
            find .artifacts/coverage -type f \( -path "*/out/coverage.json" -o -name "coverage.json" \) -print
          )

          if [[ ${#candidates[@]} -eq 0 ]]; then
            echo "[MERGE] ERROR: No coverage file found under .artifacts/coverage"
            exit 1
          fi

          best=""
          best_val="-1"

          for f in "${candidates[@]}"; do
            val="$(node -e "
              const fs=require('fs');
              const p=process.argv[1];
              try{
                const j=JSON.parse(fs.readFileSync(p,'utf8'));
                const line=(j.summary && typeof j.summary.line === 'number') ? j.summary.line : -1;
                process.stdout.write(String(line));
              }catch(e){
                process.stdout.write('-1');
              }
            " "$f")"

            echo "[MERGE] candidate: $f line=$val"

            if awk "BEGIN { exit !($val > $best_val) }"; then
              best_val="$val"
              best="$f"
            elif awk "BEGIN { exit !($val == $best_val) }"; then
              if [[ -n "$best" && "$f" < "$best" ]]; then
                best="$f"
              fi
            fi
          done

          if [[ -z "$best" ]]; then
            echo "[MERGE] ERROR: Could not select a best coverage file (all invalid?)"
            for f in "${candidates[@]}"; do
              echo "---- $f ----"
              head -n 60 "$f" || true
            done
            exit 1
          fi

          echo "[MERGE] Selected: $best (line=$best_val)"
          cp "$best" out/coverage.json

          echo "[MERGE] Final python-api-example/out/coverage.json:"
          ls -la out || true
          head -n 40 out/coverage.json || true

      - name: "Upload merged coverage artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-python-merged"
          path: python-api-example/out/coverage.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

  # 4) Coverage Governance Gate
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: [merge-coverage]
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      working-directory: "python-api-example"
      coverage-file: "./out/coverage.json"
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"
      coverage-artifact-name: "coverage-python-merged"
    secrets: inherit

  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: [merge-coverage]
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download merged coverage artifact"
        uses: actions/download-artifact@v4
        with:
          name: "coverage-python-merged"
          path: "python-api-example/out"

      - name: "Export unit test audit bundle"
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: "python-api-example"
          junit: "out/junit.xml"
          coverage: "out/coverage.json"
          audit-root: ".audit"
          runtime: "python@3.11"
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-python"
          upload-to-blob: "true"
          blob-target: "s3://brikbyte-audit/unit-tests/python-api-example"
