name: "CI — Python API Example"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  # 1) Validate brikpipe.build.yml
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "python-api-example"
      config-file: "brikpipe.build.yml"

  # 2) Python CI (build, lint, install)
  python-ci:
    name: "Python: Build & Test"
    needs: [config-validate]
    uses: BrikByte-Studios/.github/.github/workflows/template-python-ci.yml@main
    with:
      python-version: "3.11"
      project-path: "python-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) Python tests + coverage (sharded inside test-python.yml)
  tests:
    name: "Python: Unit Tests + Coverage"
    needs: [python-ci]
    uses: BrikByte-Studios/.github/.github/workflows/test-python.yml@main
    with:
      python-version: "3.11"
      working-directory: "python-api-example"
      override_shards: "4"
      flaky_detect: "true"
    secrets: inherit

  publish-flaky-report:
    name: "Publish Flaky Stability Report"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all flaky shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flaky-*
          path: .flaky-merge
          merge-multiple: true

      - name: Merge flaky analytics
        run: |
          set -euo pipefail
          mkdir -p out/flaky

          python - << 'PY'
          import json
          from pathlib import Path
          from collections import defaultdict

          root = Path(".flaky-merge")
          merged = defaultdict(lambda: {"fail":0,"pass":0,"runs":0})

          for p in root.rglob("summary.normalized.json"):
              d = json.loads(p.read_text())
              key = d.get("suite","unknown")
              merged[key]["fail"] += d.get("fail_count",0)
              merged[key]["pass"] += d.get("pass_count",0)
              merged[key]["runs"] += d.get("total_attempts",0)

          rows=[]
          for k,v in merged.items():
              rate = v["fail"]/v["runs"] if v["runs"] else 0
              rows.append({
                  "suite": k,
                  "fail_rate": round(rate,4),
                  **v
              })

          Path("out/flaky/flaky-merged.json").write_text(json.dumps(rows,indent=2))
          PY

      - name: Upload flaky stability report
        uses: actions/upload-artifact@v4
        with:
          name: flaky-stability-report
          path: out/flaky/
          retention-days: 30


  # 3.5) Merge shard coverage artifacts into one canonical output (v1: pick one)
  merge-coverage:
    name: "Merge coverage shards"
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download all coverage shard artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-python-*"
          path: "python-api-example/.artifacts/coverage"
          merge-multiple: true

      - name: "Select canonical coverage (supports out/coverage.json OR coverage.json)"
        working-directory: "python-api-example"
        run: |
          set -euo pipefail
          mkdir -p out

          echo "[MERGE] Listing downloaded coverage artifacts:"
          find .artifacts/coverage -maxdepth 12 -type f -print || true

          mapfile -t candidates < <(
            find .artifacts/coverage -type f \( -path "*/out/coverage.json" -o -name "coverage.json" \) -print
          )

          if [[ ${#candidates[@]} -eq 0 ]]; then
            echo "[MERGE] ERROR: No coverage file found under .artifacts/coverage"
            exit 1
          fi

          best=""
          best_val="-1"

          for f in "${candidates[@]}"; do
            val="$(node -e "
              const fs=require('fs');
              const p=process.argv[1];
              try{
                const j=JSON.parse(fs.readFileSync(p,'utf8'));
                const line=(j.summary && typeof j.summary.line === 'number') ? j.summary.line : -1;
                process.stdout.write(String(line));
              }catch(e){
                process.stdout.write('-1');
              }
            " "$f")"

            echo "[MERGE] candidate: $f line=$val"

            if awk "BEGIN { exit !($val > $best_val) }"; then
              best_val="$val"
              best="$f"
            elif awk "BEGIN { exit !($val == $best_val) }"; then
              if [[ -n "$best" && "$f" < "$best" ]]; then
                best="$f"
              fi
            fi
          done

          if [[ -z "$best" ]]; then
            echo "[MERGE] ERROR: Could not select a best coverage file (all invalid?)"
            for f in "${candidates[@]}"; do
              echo "---- $f ----"
              head -n 60 "$f" || true
            done
            exit 1
          fi

          echo "[MERGE] Selected: $best (line=$best_val)"
          cp "$best" out/coverage.json

          echo "[MERGE] Final python-api-example/out/coverage.json:"
          ls -la out || true
          head -n 40 out/coverage.json || true

      - name: "Upload merged coverage artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-python-merged"
          path: python-api-example/out/coverage.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

  # 4) Coverage Governance Gate
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: [merge-coverage]
    uses: BrikByte-Studios/.github/.github/workflows/coverage-check.yml@main
    with:
      working-directory: "python-api-example"
      coverage-file: "./out/coverage.json"
      policy-file: "../.governance/tests.yml"
      baseline-file: "../.audit/coverage-baseline.json"
      coverage-artifact-name: "coverage-python-merged"
    secrets: inherit

  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: [merge-coverage]
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download merged coverage artifact"
        uses: actions/download-artifact@v4
        with:
          name: "coverage-python-merged"
          path: "python-api-example/out"

      - name: "Export unit test audit bundle"
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: "python-api-example"
          junit: "out/junit.xml"
          coverage: "out/coverage.json"
          audit-root: ".audit"
          runtime: "python@3.11"
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-python"
          upload-to-blob: "true"
          blob-target: "s3://brikbyte-audit/unit-tests/python-api-example"
