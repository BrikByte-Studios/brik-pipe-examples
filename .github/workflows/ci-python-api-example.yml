name: "CI — Python API Example"

on:
  push:
    branches: [ main, master ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/ci-python-api-example.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "python-api-example/**"
      - ".github/workflows/ci-python-api-example.yml"

permissions:
  contents: read

jobs:
  # 1) Validate brikpipe.build.yml
  config-validate:
    uses: BrikByte-Studios/.github/.github/workflows/ci-config-validate.yml@main
    with:
      project-path: "python-api-example"
      config-file: "brikpipe.build.yml"

  # 2) Python CI (build, lint, install)
  python-ci:
    name: "Python: Build & Test"
    uses: BrikByte-Studios/.github/.github/workflows/template-python-ci.yml@main
    needs: config-validate
    with:
      python-version: "3.11"
      project-path: "python-api-example"
      force-cache-refresh: "false"
    secrets: inherit

  # 3) Python tests + coverage (sharded inside test-python.yml)
  tests:
    name: "Python: Unit Tests + Coverage"
    needs: python-ci
    uses: BrikByte-Studios/.github/.github/workflows/test-python.yml@main
    with:
      python-version: "3.11"
      working-directory: "python-api-example"
      override_shards: "4"
      # matrix_config_path: ""   # (optional) let matrix-plan use its default internal config

  # 3.5) Merge shard coverage artifacts into one canonical output (v1: pick one)
  merge-coverage:
    name: "Merge coverage shards"
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download all coverage shard artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: "coverage-python-*"
          path: "python-api-example/.artifacts/coverage"
          merge-multiple: true

      - name: "Select canonical coverage.json"
        working-directory: "python-api-example"
        run: |
          set -euo pipefail
          mkdir -p out

          echo "[MERGE] Listing downloaded coverage artifacts:"
          find .artifacts/coverage -maxdepth 8 -type f -print || true

          # If download merged files "flat", shard paths may disappear and you may get:
          #   .artifacts/coverage/out/coverage.json
          if [[ -f ".artifacts/coverage/out/coverage.json" ]]; then
            echo "[MERGE] Using merged-flat coverage: .artifacts/coverage/out/coverage.json"
            cp ".artifacts/coverage/out/coverage.json" "out/coverage.json"
          else
            # Otherwise search nested
            shard1="$(find .artifacts/coverage -type f -path "*/shard1*/out/coverage.json" -print -quit 2>/dev/null || true)"
            first="$(find .artifacts/coverage -type f -path "*/out/coverage.json" -print -quit 2>/dev/null || true)"

            if [[ -n "${shard1}" ]]; then
              echo "[MERGE] Using shard1 coverage: ${shard1}"
              cp "${shard1}" out/coverage.json
            elif [[ -n "${first}" ]]; then
              echo "[MERGE] Using first nested coverage: ${first}"
              cp "${first}" out/coverage.json
            else
              echo "[MERGE] ERROR: No out/coverage.json found under .artifacts/coverage"
              exit 1
            fi
          fi

          echo "[MERGE] Final out/coverage.json:"
          cat out/coverage.json

      - name: "Upload merged coverage artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-python-merged"
          path: |
            python-api-example/out/coverage.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

  # 4) Coverage Governance Gate
  # NOTE: This MUST download the merged coverage artifact in THIS job.
  coverage-gate:
    name: "Coverage Governance Gate"
    needs: merge-coverage
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Download merged coverage artifact"
        uses: actions/download-artifact@v4
        with:
          name: "coverage-python-merged"
          path: "python-api-example"

      - name: "Run coverage governance gate"
        uses: BrikByte-Studios/.github/.github/actions/coverage-gate@main
        with:
          working-directory: "python-api-example"
          coverage-file: "./out/coverage.json"
          policy-file: "../.governance/tests.yml"
          baseline-file: "../.audit/coverage-baseline.json"

  # 5) Unit Test Audit Export (.audit/<ts>/unit-tests/*)
  unit-test-audit:
    name: "Unit Test Audit Export"
    needs: merge-coverage
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # Download merged coverage artifact into project root (avoid nested out/out path)
      - name: "Download merged coverage artifact"
        uses: actions/download-artifact@v4
        with:
          name: "coverage-python-merged"
          path: "python-api-example"

      # OPTIONAL: if you also need junit.xml from shards, download them too (patterned)
      # - name: "Download all junit shard artifacts"
      #   uses: actions/download-artifact@v4
      #   with:
      #     pattern: "coverage-python-*"
      #     path: "python-api-example/.artifacts/junit"
      #     merge-multiple: true

      - name: "Export unit test audit bundle"
        if: always()
        uses: BrikByte-Studios/.github/.github/actions/audit-export@main
        with:
          working-directory: "python-api-example"
          junit: "out/junit.xml"              # ensure your Makefile/pytest writes this
          coverage: "out/coverage.json"
          audit-root: ".audit"
          runtime: "python@3.11"
          duration-seconds: ""
          upload-artifact: "true"
          artifact-name: "unit-tests-audit-python"
          upload-to-blob: "true"             # set true once blob sync exists
          blob-target: "s3://brikbyte-audit/unit-tests/python-api-example"
