# BrikPipe — .NET API Example Integration Tests
# ---------------------------------------------
# This workflow:
#   - Builds (or pulls) the example .NET API image.
#   - Spins up app + Postgres in a dedicated Docker network.
#   - Uses the shared BrikPipe integration-test reusable workflow.
#   - Runs .NET integration tests via the generic runner (TEST_LANGUAGE=dotnet).
#
# Service assumptions:
#   - Project lives under: dotnet-api-example/
#   - Dockerfile:          dotnet-api-example/Dockerfile
#   - App port:            8080
#   - Health endpoint:     GET /health → 200 OK.
#
# Image naming convention:
#   ghcr.io/brikbyte-studios/example-dotnet-api:sha-${{ github.sha }}

name: "BrikPipe — .NET API Integration"

on:
  push:
    branches: [ main ]
    paths:
      - "dotnet-api-example/**"
      - ".github/workflows/dotnet-api-integration.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "dotnet-api-example/**"
      - ".github/workflows/dotnet-api-integration.yml"

jobs:
  integration:
    name: ".NET API — Containerized Integration Tests"
    uses: BrikByte-Studios/.github/.github/workflows/integration-test.yml@main
    secrets: inherit
    with:
      image: ghcr.io/brikbyte-studios/example-dotnet-api:sha-${{ github.sha }}

      dockerfile: dotnet-api-example/Dockerfile
      context: dotnet-api-example

      db_image: postgres:16
      cache_image: redis:7
      enable_cache_service: false

      test_language: "dotnet"

      # Robust: no assumptions about where the csproj sits inside dotnet-api-example
      test_command: >-
        bash -lc '
          set -euo pipefail;
          proj=$(find . -type f -name "*IntegrationTests*.csproj" | sort | head -n 1);
          if [ -z "$proj" ]; then
            echo "❌ No IntegrationTests csproj found under $(pwd)";
            find . -maxdepth 4 -type f -name "*.csproj" | sort;
            exit 2;
          fi;
          echo "✅ Using test project: $proj";
          dotnet test "$proj" --configuration Release --filter "Category=Integration&IntegItem=${INTEG_ITEM}"
        '

      healthcheck_path: "/health"
      healthcheck_timeout: "60"
      app_port: "8080"
      db_port: "5432"

      services_csv: "payments,users"
      scenarios_csv: "happy_path,declined_card,timeout"

      override_shards: "4"

