# Docstring:
# E2E matrix: browser × shards (2 shards each). Runner expands into per-browser shard jobs.
version: "parallel.v1"

parallel:
  enabled: true
  mode: "static"
  shards: 2

  limits:
    max_shards: 16
    max_matrix_jobs: 32

  matrix:
    include:
      - kind: "e2e"
        name: "pw-chromium"
        browser: "chromium"
        shards: 2

      - kind: "e2e"
        name: "pw-firefox"
        browser: "firefox"
        shards: 2
