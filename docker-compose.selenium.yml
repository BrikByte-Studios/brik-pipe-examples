# ==============================================================================
# Selenium Grid (CI-first) — BrikByteOS v1
# ==============================================================================
#
# PURPOSE
# -------
# Deterministic Selenium Grid 4 setup for cross-browser E2E runs in CI.
#
# SERVICES
# --------
# - selenium-hub: session router + Grid UI + status endpoint
# - chrome:       registers to hub via event-bus (4442/4443)
# - firefox:      registers to hub via event-bus (4442/4443)
# - edge:         optional profile, enabled via `--profile edge`
#
# ENDPOINTS
# ---------
# - Status:  http://localhost:4444/wd/hub/status
# - Remote:  http://localhost:4444/wd/hub
#
# NOTES
# -----
# - Uses official Selenium images.
# - Publishes 4444 on the runner host for host-based runners (Java/Python).
#
# ==============================================================================

name: brikbyte-selenium-grid

services:
  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
    environment:
      - SE_LOG_LEVEL=INFO
      - SE_OPTS=--log-level INFO
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4444/wd/hub/status | grep -q '\"ready\"'"]
      interval: 5s
      timeout: 3s
      retries: 30

  chrome:
    image: selenium/node-chrome:4.27.0
    shm_size: "2gb"
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_LOG_LEVEL=INFO

  firefox:
    image: selenium/node-firefox:4.27.0
    shm_size: "2gb"
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_LOG_LEVEL=INFO

  edge:
    image: selenium/node-edge:4.27.0
    shm_size: "2gb"
    profiles: ["edge"]
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_LOG_LEVEL=INFO
