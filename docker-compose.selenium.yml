# docker-compose.selenium.yml
#
# Purpose:
#   CI-first Selenium Grid 4 deployment for cross-browser testing.
#
# Services:
#   - selenium-hub: router + event bus
#   - chrome:       required browser node
#   - firefox:      required browser node
#   - edge:         optional node (enabled via compose profile "edge")
#
# Health:
#   - Hub exposes /status at: http://localhost:4444/status
#
# Notes:
#   - shm_size=2gb reduces browser crashes under CI constraints.
#   - Hub publishes:
#       4444 (WebDriver + status)
#       4442/4443 (event bus)
#
version: "3.9"

services:
  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    hostname: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      # Optional but improves deterministic networking in some environments
      - SE_ENABLE_TRACING=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 3s
      retries: 20

  chrome:
    image: selenium/node-chrome:4.21.0
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      # Tell node where hub + event bus are
      - SE_HUB_HOST=selenium-hub
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

      # Helps node advertise correct host within docker network
      - SE_NODE_HOST=chrome
      - SE_NODE_PORT=5555

  firefox:
    image: selenium/node-firefox:4.21.0
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_HUB_HOST=selenium-hub
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_HOST=firefox
      - SE_NODE_PORT=5555

  edge:
    image: selenium/node-edge:4.21.0
    shm_size: 2gb
    profiles: ["edge"]
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_HUB_HOST=selenium-hub
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_HOST=edge
      - SE_NODE_PORT=5555

