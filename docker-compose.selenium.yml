# docker-compose.selenium.yml
#
# Purpose:
#   CI-first Selenium Grid 4 deployment for cross-browser testing.
#
# Services:
#   - selenium-hub: router + event bus
#   - chrome:       required browser node
#   - firefox:      required browser node
#   - edge:         optional node (enabled via compose profile "edge")
#
# Health:
#   - Hub exposes /status at: http://localhost:4444/status
#
# Notes:
#   - shm_size=2gb reduces browser crashes under CI constraints.
#   - Hub publishes:
#       4444 (WebDriver + status)
#       4442/4443 (event bus)
#
services:
  selenium-hub:
    image: selenium/hub:4.24.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4444/status >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  chrome:
    image: selenium/node-chrome:4.24.0
    container_name: chrome
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  firefox:
    image: selenium/node-firefox:4.24.0
    container_name: firefox
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  edge:
    # Optional: only runs when workflow passes enable_edge=true
    # and the reusable workflow starts compose with --profile edge
    profiles: ["edge"]
    image: selenium/node-edge:4.24.0
    container_name: edge
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
